:root {

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--sans); background: var(--bg1); color: var(--txt); min-height: 100vh; display: flex; flex-direction: column; }
::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: var(--bg1); } ::-webkit-scrollbar-thumb { background: var(--bd); border-radius: 3px; }
input, select, textarea, button { font-family: inherit; }

#header .edge-fade { position: absolute; inset: 0; pointer-events: none; background: linear-gradient(to right, var(--bg1) 0%, transparent 15%, transparent 85%, var(--bg1) 100%); }
#header .content { position: relative; z-index: 2; display: flex; justify-content: space-between; align-items: center; }
.header-left { display: flex; flex-direction: column; gap: 2px; }
.line1 { font-family: var(--font); font-size: 16px; font-weight: 800; color: var(--ag); letter-spacing: 1px; }
.line2 { font-family: var(--font); font-size: 22px; font-weight: 800; color: var(--pk); letter-spacing: 2px; }
.line3 { font-family: var(--font); font-size: 13px; font-weight: 700; color: var(--txt); cursor: pointer; }
.line4 { font-family: var(--font); font-size: 12px; color: var(--ag2); display: flex; align-items: center; gap: 6px; }
.line4 .temp { color: var(--pk); font-weight: 700; }
.header-right { text-align: right; }
.logo { font-family: var(--font); font-size: 20px; font-weight: 800; color: var(--ag); letter-spacing: 2px; text-transform: uppercase; }
.logo span { color: var(--pk); }
.config-row { display: flex; gap: 10px; align-items: center; justify-content: flex-end; margin-top: 8px; flex-wrap: wrap; }
.config-label { font-size: 9px; color: var(--txt2); font-family: var(--font); letter-spacing: 0.5px; }
.per-floor-badge { font-family: var(--font); font-size: 9px; color: var(--pk); background: rgba(255,105,180,0.08); padding: 3px 8px; border-radius: 3px; border: 1px solid rgba(255,105,180,0.2); }

/* LAYOUT */
#app-body { display: flex; flex: 1; overflow: hidden; }
#sidebar { width: 220px; min-width: 220px; background: var(--bg2); border-right: 1px solid var(--bd); display: flex; flex-direction: column; transition: width .2s, min-width .2s; position: sticky; top: 110px; height: calc(100vh - 110px); overflow: hidden; }
#sidebar.collapsed { width: 52px; min-width: 52px; }
#sidebar .toggle { background: transparent; border: none; color: var(--pk); cursor: pointer; padding: 10px; font-size: 18px; border-bottom: 1px solid var(--bd); }
#sidebar .nav-section { padding: 0 8px; }
#sidebar .nav-label { font-family: var(--font); font-size: 9px; color: var(--txt2); text-transform: uppercase; letter-spacing: 1px; padding: 8px 8px 4px; font-weight: 700; }
.nav-btn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 10px 12px; background: transparent; border: none; border-left: 3px solid transparent; border-radius: 6px; cursor: pointer; color: var(--txt2); font-size: 13px; font-weight: 500; font-family: var(--sans); transition: all .15s; margin-bottom: 2px; text-align: left; }
.nav-btn.active { background: rgba(112,224,0,0.09); border-left-color: var(--ag); color: var(--ag); font-weight: 700; }
.nav-btn.trade-active { background: rgba(255,105,180,0.09); border-left-color: var(--pk); color: var(--pk); font-weight: 700; }
.nav-btn .icon { font-size: 16px; flex-shrink: 0; }
.nav-btn .progress-mini { height: 3px; border-radius: 2px; background: var(--bd); margin-top: 3px; overflow: hidden; }
.nav-btn .progress-mini-fill { height: 100%; border-radius: 2px; transition: width .5s; }
.nav-divider { height: 1px; background: var(--bd); margin: 10px 8px; }
#sidebar .footer { padding: 12px; border-top: 1px solid var(--bd); text-align: center; font-family: var(--font); font-size: 9px; color: var(--txt2); }
#main { flex: 1; padding: 20px; overflow: auto; max-height: calc(100vh - 110px); }

/* CARDS & ELEMENTS */
.card { background: var(--bg2); border: 1px solid var(--bd); border-radius: 8px; padding: 16px; margin-bottom: 12px; }
.card-title { font-family: var(--font); font-size: 14px; font-weight: 700; color: var(--pk); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
.stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-bottom: 16px; }
.stat-card { text-align: center; padding: 12px; }
.stat-value { font-family: var(--font); font-size: 32px; font-weight: 800; }
.stat-label { font-size: 11px; color: var(--txt2); text-transform: uppercase; font-family: var(--font); letter-spacing: 1px; }
.legend { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--txt2); }
.legend-dot { width: 12px; height: 12px; border-radius: 3px; }
.unit-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(52px, 1fr)); gap: 4px; }
.unit-cell { aspect-ratio: 1; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-family: var(--font); font-weight: 700; color: #000; cursor: pointer; border: 2px solid transparent; opacity: 0.9; transition: all .15s; position: relative; }
.unit-cell:hover { opacity: 1; transform: scale(1.1); z-index: 5; }
.unit-cell.selected { border-color: #FFF; }
.access-badge { position: absolute; top: -3px; right: -3px; width: 10px; height: 10px; border-radius: 50%; background: var(--pk2); border: 1px solid var(--bg2); }
.input { background: var(--bg1); border: 1px solid var(--bd); border-radius: 4px; padding: 8px 12px; color: var(--txt); font-size: 13px; width: 100%; }
.select { background: var(--bg1); border: 1px solid var(--bd); border-radius: 4px; padding: 8px 12px; color: var(--txt); font-size: 13px; }
.btn { padding: 8px 16px; border-radius: 4px; border: none; font-family: var(--font); font-size: 12px; font-weight: 600; cursor: pointer; transition: all .2s; background: var(--bd); color: var(--txt); }
.btn:hover { opacity: 0.85; }
.btn-primary { background: var(--ag); color: #000; }
.btn-danger { background: var(--pk2); color: #FFF; }
.btn-success { background: var(--ag2); color: #000; }
.tag { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 10px; font-weight: 700; font-family: var(--font); }
.progress-bar { height: 8px; border-radius: 4px; background: var(--bd); position: relative; overflow: hidden; flex: 1; }
.progress-fill { position: absolute; left: 0; top: 0; bottom: 0; border-radius: 4px; transition: width .5s ease; }
.textarea { background: var(--bg1); border: 1px solid var(--bd); border-radius: 4px; padding: 8px 12px; color: var(--txt); font-size: 13px; width: 100%; min-height: 80px; resize: vertical; }
.field-label { font-size: 11px; color: var(--txt2); font-weight: 600; margin-bottom: 4px; display: block; font-family: var(--font); text-transform: uppercase; letter-spacing: 0.5px; }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 20px; }
.modal-inner { background: var(--bg2); border: 1px solid var(--bd); border-radius: 12px; max-width: 800px; width: 100%; max-height: 90vh; overflow: auto; padding: 24px; }
.modal-tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 1px solid var(--bd); padding-bottom: 8px; flex-wrap: wrap; }
.modal-tab { padding: 8px 16px; color: var(--txt2); cursor: pointer; font-size: 13px; font-weight: 600; background: transparent; border: none; border-bottom: 2px solid transparent; font-family: var(--sans); }
.modal-tab.active { color: var(--pk); border-bottom-color: var(--pk); }
.filter-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.schedule-btn { padding: 6px 14px; border-radius: 4px; border: 1px solid var(--bd); background: transparent; color: var(--txt2); cursor: pointer; font-size: 12px; font-weight: 600; font-family: var(--font); transition: all .2s; }
.schedule-btn.active { border: 2px solid var(--ag); background: rgba(112,224,0,0.12); color: var(--ag); }
.trade-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; padding: 10px; }
.common-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 768px) { .field-grid, .two-col { grid-template-columns: 1fr; } #sidebar { display: none; } }
</style>

const SC={"Not Started":"#FF4D6D","In Progress":"#CDEB45","Complete":"#70E000","Vacant":"#FFB3C6"};
const COMMON_AREAS=[
  {id:"elev",label:"Elevators",icon:"🛗",items:["Car 1","Car 2","Car 3","Car 4"]},
  {id:"roof",label:"Roof",icon:"🏗️",items:["Main Roof","Bulkhead","Water Tower","Antenna Platform"]},
  {id:"base",label:"Basement",icon:"🔧",items:["Boiler Room","Storage","Laundry","Mechanical"]},
  {id:"grnd",label:"Grounds",icon:"🌳",items:["Front Entrance","Courtyard","Parking","Sidewalk"]}
];
const NAMES_F=["Maria","James","Wei","Fatima","Carlos","Sarah","David","Priya","Ahmed","Linda","John","Ana","Michael","Olga","Roberto"];
const NAMES_L=["Rodriguez","Chen","Williams","Patel","Kim","Johnson","Martinez","Lee","Brown","Singh","Garcia","Thompson","Nguyen","Davis","Wilson"];

// ─── STATE ────────────────────────────────────────
let state = {
  units: [], schedule: {}, commonAreas: {},
  page: "dashboard", selectedUnit: null, tradeFilter: "",
  unitCount: 25, floorCount: 5, unitFormat: "alpha",
  sidebarOpen: true, modalTab: "info",
  gridFloorFilter: "", gridStatusFilter: "", gridSearch: "",
  scheduleView: "global", fieldEvents: [
    {time:"8:15 AM",type:"arrival",msg:"Plumbing crew arrived - 4 workers",unit:"1A"},
    {time:"8:30 AM",type:"access",msg:"⚠ Cannot access unit - no response",unit:"2C"},
    {time:"9:00 AM",type:"progress",msg:"Electrical rough-in complete",unit:"3B"},
    {time:"9:45 AM",type:"issue",msg:"Water damage found behind wall",unit:"4A"},
    {time:"10:15 AM",type:"delivery",msg:"Window delivery received - 12 units",unit:"Lobby"},
    {time:"10:30 AM",type:"inspection",msg:"DOB inspector on site - floor 3",unit:"300s"}
  ],
  bulkSelected: [], bulkTrades: [], noticeTrades: []
};

// ─── DATA GEN ─────────────────────────────────────
function getLetter(i){let l="",n=i;do{l=String.fromCharCode(65+(n%26))+l;n=Math.floor(n/26)-1;}while(n>=0);return l;}
function rName(){return{first:NAMES_F[Math.floor(Math.random()*NAMES_F.length)],last:NAMES_L[Math.floor(Math.random()*NAMES_L.length)]};}

function genUnits(count,fmt,floors){
  const units=[], perFloor=Math.ceil(count/floors);
  for(let i=0;i<count;i++){
    const fl=Math.floor(i/perFloor)+1, pos=i%perFloor;
    const label=fmt==="alpha"?`${fl}${getLetter(pos)}`:`${fl}${String(pos+1).padStart(2,"0")}`;
    const vac=Math.random()<0.12, nm=rName(), trades={};
    TRADES.forEach(t=>{const r=Math.random();trades[t]={status:r<0.3?"Not Started":r<0.7?"In Progress":"Complete",phase:PHASES[Math.floor(Math.random()*PHASES.length)],scheduled:Math.random()<0.4,accessDenied:Math.random()<0.08};});
    units.push({id:i+1,unit:label,floor:fl,vacant:vac,contact:{first:vac?"":nm.first,last:vac?"":nm.last,phone:vac?"":`(212) 555-${String(Math.floor(Math.random()*9000)+1000)}`,email:vac?"":`${nm.first.toLowerCase()}.${nm.last.toLowerCase()}@email.com`},trades,comments:[],photos:[],notices:[]});
  }
  return units;
}

function genSchedule(){
  const s={},today=new Date();
  TRADES.forEach(t=>{const st=new Date(today);st.setDate(st.getDate()+Math.floor(Math.random()*14));const en=new Date(st);en.setDate(en.getDate()+Math.floor(Math.random()*60)+30);s[t]={start:st.toISOString().split("T")[0],end:en.toISOString().split("T")[0],progress:Math.floor(Math.random()*100)};});
  return s;
}

// ─── HELPERS ──────────────────────────────────────
function unitColor(u){if(u.vacant)return SC.Vacant;const s=Object.values(u.trades).map(t=>t.status);if(s.every(x=>x==="Complete"))return SC.Complete;if(s.every(x=>x==="Not Started"))return SC["Not Started"];return SC["In Progress"];}
function tradeColor(s){return SC[s]||"#8FA88A";}
function fmtDate(d){return new Date(d).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}
function tagHTML(color,text){return `<span class="tag" style="background:${color}30;color:${color};border:1px solid ${color}50">${text}</span>`;}
function escHTML(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML;}

// ─── CLOCK ────────────────────────────────────────
function updateClock(){
  const now=new Date();
  const day=now.toLocaleDateString("en-US",{weekday:"long"});
  const date=`${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}-${now.getFullYear()}`;
  document.getElementById("dateLine").textContent=`${day}, ${date}`;
  document.getElementById("timeLine").textContent=now.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
}
setInterval(updateClock,1000);updateClock();

// ─── SIDEBAR ──────────────────────────────────────
function toggleSidebar(){
  state.sidebarOpen=!state.sidebarOpen;
  document.getElementById("sidebar").classList.toggle("collapsed");
  document.getElementById("sidebarToggle").textContent=state.sidebarOpen?"◀":"▶";
  document.getElementById("sidebarFooter").style.display=state.sidebarOpen?"block":"none";
  renderSidebar();
}

function renderSidebar(){
  const sb=document.getElementById("sidebarNav");
  const open=state.sidebarOpen;
  const mainPages=[{id:"dashboard",label:"Dashboard",icon:"🏢"},{id:"schedule",label:"Schedule",icon:"📅"},{id:"field",label:"Field Monitor",icon:"📡"},{id:"common",label:"Common Areas",icon:"🔧"},{id:"notices",label:"Notices",icon:"📋"}];
  let h=open?`<div class="nav-section"><div class="nav-label">Navigation</div>`:`<div class="nav-section">`;
  mainPages.forEach(p=>{
    const act=state.page===p.id?"active":"";
    h+=`<button class="nav-btn ${act}" onclick="navigate('${p.id}')"><span class="icon">${p.icon}</span>${open?`<span>${p.label}</span>`:""}</button>`;
  });
  h+=`</div><div class="nav-divider"></div><div class="nav-section">`;
  if(open)h+=`<div class="nav-label">Trades</div>`;
  TRADES.forEach(t=>{
    const act=state.page===`trade-${t}`?"trade-active":"";
    const prog=state.schedule[t]?.progress||0;
    const progColor=prog===100?"var(--ag)":prog>0?"var(--ag2)":"var(--pk2)";
    h+=`<button class="nav-btn ${act}" onclick="navigate('trade-${escHTML(t)}')"><span class="icon">🔨</span>`;
    if(open)h+=`<div style="flex:1;text-align:left"><div>${escHTML(t)}</div><div class="progress-mini"><div class="progress-mini-fill" style="width:${prog}%;background:${progColor}"></div></div></div>`;
    h+=`</button>`;
  });
  h+=`</div>`;
  sb.innerHTML=h;
}

function navigate(page){
  state.page=page;
  state.tradeFilter=page.startsWith("trade-")?page.replace("trade-",""):"";
  state.gridFloorFilter="";state.gridStatusFilter="";state.gridSearch="";
  renderSidebar();renderMain();
}

// ─── CONFIG ───────────────────────────────────────
function initConfig(){
  const fs=document.getElementById("floorCountSel");
  for(let i=1;i<=50;i++)fs.innerHTML+=`<option value="${i}"${i===5?" selected":""}>${i}</option>`;
  const us=document.getElementById("unitCountSel");
  for(let i=25;i<=500;i++)us.innerHTML+=`<option value="${i}"${i===25?" selected":""}>${i}</option>`;
  updatePerFloor();
}

function toggleFormat(){
  state.unitFormat=state.unitFormat==="alpha"?"numeric":"alpha";
  document.getElementById("formatBtn").textContent=state.unitFormat==="alpha"?"1A, 1B, 2A...":"101, 102, 201...";
  rebuildUnits();
}

function rebuildUnits(){
  state.unitCount=parseInt(document.getElementById("unitCountSel").value);
  state.floorCount=parseInt(document.getElementById("floorCountSel").value);
  state.units=genUnits(state.unitCount,state.unitFormat,state.floorCount);
  state.selectedUnit=null;
  updatePerFloor();renderMain();
}

function updatePerFloor(){document.getElementById("perFloorBadge").textContent=`${Math.ceil(state.unitCount/state.floorCount)}/floor`;}

function editProject(){
  const n=prompt("Project Name:",document.getElementById("projectName").textContent);
  if(n)document.getElementById("projectName").textContent=n;
}

// ─── LEGEND ───────────────────────────────────────
function legendHTML(){
  let h=`<div class="legend">`;
  Object.entries(SC).forEach(([k,v])=>{h+=`<div class="legend-item"><div class="legend-dot" style="background:${v}"></div><span>${k}</span></div>`;});
  h+=`<div class="legend-item"><div class="legend-dot" style="width:10px;height:10px;border-radius:50%;background:var(--pk2)"></div><span>Access Denied</span></div></div>`;
  return h;
}

// ─── UNIT GRID ────────────────────────────────────
function unitGridHTML(){
  const maxFloor=Math.max(...state.units.map(u=>u.floor));
  let filtered=[...state.units];
  if(state.gridFloorFilter)filtered=filtered.filter(u=>u.floor===parseInt(state.gridFloorFilter));
  if(state.gridStatusFilter==="Vacant")filtered=filtered.filter(u=>u.vacant);
  else if(state.gridStatusFilter==="Not Started")filtered=filtered.filter(u=>!u.vacant&&Object.values(u.trades).every(t=>t.status==="Not Started"));
  else if(state.gridStatusFilter==="In Progress")filtered=filtered.filter(u=>!u.vacant&&Object.values(u.trades).some(t=>t.status==="In Progress"));
  else if(state.gridStatusFilter==="Complete")filtered=filtered.filter(u=>!u.vacant&&Object.values(u.trades).every(t=>t.status==="Complete"));
  if(state.gridSearch)filtered=filtered.filter(u=>u.unit.toLowerCase().includes(state.gridSearch.toLowerCase())||`${u.contact.first} ${u.contact.last}`.toLowerCase().includes(state.gridSearch.toLowerCase()));

  let h=`<div class="filter-row">
    <input class="input" style="width:160px" placeholder="Search unit or name..." value="${escHTML(state.gridSearch)}" oninput="state.gridSearch=this.value;renderMain()">
    <select class="select" onchange="state.gridFloorFilter=this.value;renderMain()"><option value="">All Floors</option>`;
  for(let i=1;i<=maxFloor;i++)h+=`<option value="${i}"${state.gridFloorFilter==i?" selected":""}>Floor ${i}</option>`;
  h+=`</select><select class="select" onchange="state.gridStatusFilter=this.value;renderMain()"><option value=""${!state.gridStatusFilter?" selected":""}>All Status</option>
    <option${state.gridStatusFilter==="Vacant"?" selected":""}>Vacant</option><option${state.gridStatusFilter==="Not Started"?" selected":""}>Not Started</option>
    <option${state.gridStatusFilter==="In Progress"?" selected":""}>In Progress</option><option${state.gridStatusFilter==="Complete"?" selected":""}>Complete</option></select>
    <span style="font-size:11px;color:var(--txt2);font-family:var(--font)">${filtered.length} units</span></div>`;
  h+=`<div class="unit-grid">`;
  filtered.forEach(u=>{
    let color;
    if(state.tradeFilter)color=u.vacant?SC.Vacant:tradeColor(u.trades[state.tradeFilter]?.status);
    else color=unitColor(u);
    const hasAccess=Object.values(u.trades).some(t=>t.accessDenied&&t.scheduled);
    const sel=state.selectedUnit?.id===u.id?"selected":"";
    h+=`<div class="unit-cell ${sel}" style="background:${color}" onclick="openUnit(${u.id})" title="Unit ${u.unit}">${u.unit}${hasAccess?`<div class="access-badge"></div>`:""}</div>`;
  });
  h+=`</div>`;
  return h;
}

// ─── MAIN RENDER ──────────────────────────────────
function renderMain(){
  const m=document.getElementById("main");
  if(state.page==="dashboard")renderDashboard(m);
  else if(state.page.startsWith("trade-"))renderTrade(m);
  else if(state.page==="schedule")renderSchedule(m);
  else if(state.page==="field")renderField(m);
  else if(state.page==="common")renderCommon(m);
  else if(state.page==="notices")renderNotices(m);
}

function renderDashboard(m){
  const u=state.units;
  const active=u.filter(x=>Object.values(x.trades).some(t=>t.status==="In Progress")).length;
  const complete=u.filter(x=>!x.vacant&&Object.values(x.trades).every(t=>t.status==="Complete")).length;
  const notStarted=u.filter(x=>!x.vacant&&Object.values(x.trades).every(t=>t.status==="Not Started")).length;
  const vacant=u.filter(x=>x.vacant).length;
  const access=u.filter(x=>Object.values(x.trades).some(t=>t.accessDenied)).length;

  m.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div>
      <h2 style="font-family:var(--font);color:var(--txt);margin:0;font-size:16px">BUILDING OVERVIEW</h2>
      <span style="font-size:12px;color:var(--txt2)">${u.length} units • Click any unit for details</span>
    </div></div>
    ${legendHTML()}
    <div class="stat-grid">
      <div class="card stat-card"><div class="stat-value" style="color:var(--pk)">${u.length}</div><div class="stat-label">Total Units</div></div>
      <div class="card stat-card"><div class="stat-value" style="color:var(--ag2)">${active}</div><div class="stat-label">Active Work</div></div>
      <div class="card stat-card"><div class="stat-value" style="color:var(--ag)">${complete}</div><div class="stat-label">Completed</div></div>
      <div class="card stat-card"><div class="stat-value" style="color:var(--pk2)">${notStarted}</div><div class="stat-label">Not Started</div></div>
      <div class="card stat-card"><div class="stat-value" style="color:var(--pk3)">${vacant}</div><div class="stat-label">Vacant</div></div>
      <div class="card stat-card"><div class="stat-value" style="color:var(--pk2)">${access}</div><div class="stat-label">Access Issues</div></div>
    </div>
    <div class="card"><div class="card-title">Unit Map</div>${unitGridHTML()}</div>`;
}

function renderTrade(m){
  const t=state.tradeFilter;
  const ns=state.units.filter(u=>u.trades[t]?.status==="Not Started").length;
  const ip=state.units.filter(u=>u.trades[t]?.status==="In Progress").length;
  const cp=state.units.filter(u=>u.trades[t]?.status==="Complete").length;
  const prog=state.schedule[t]?.progress||0;

  m.innerHTML=`
    <h2 style="font-family:var(--font);color:var(--ag);margin:0 0 12px;font-size:16px">${escHTML(t)} — TRADE VIEW</h2>
    ${legendHTML()}
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px">
      <div class="card" style="text-align:center"><div class="stat-value" style="color:${SC["Not Started"]}">${ns}</div><div class="stat-label">Not Started</div></div>
      <div class="card" style="text-align:center"><div class="stat-value" style="color:${SC["In Progress"]}">${ip}</div><div class="stat-label">In Progress</div></div>
      <div class="card" style="text-align:center"><div class="stat-value" style="color:${SC.Complete}">${cp}</div><div class="stat-label">Complete</div></div>
    </div>
    <div class="card"><div class="card-title">Schedule: ${escHTML(t)}</div>
      <div style="display:flex;align-items:center;gap:12px"><div class="progress-bar"><div class="progress-fill" style="width:${prog}%;background:var(--ag)"></div></div>
      <span style="font-family:var(--font);font-size:12px">${prog}%</span></div>
      <div style="font-size:12px;color:var(--txt2);margin-top:6px">${fmtDate(state.schedule[t]?.start)} → ${fmtDate(state.schedule[t]?.end)}</div>
    </div>
    <div class="card"><div class="card-title">${escHTML(t)} Unit Map</div>${unitGridHTML()}</div>`;
}

function renderSchedule(m){
  const sv=state.scheduleView;
  let tabs=`<div style="display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap">
    <button class="schedule-btn ${sv==="global"?"active":""}" onclick="state.scheduleView='global';renderMain()">Global Schedule</button>
    <button class="schedule-btn ${sv==="lookahead"?"active":""}" onclick="state.scheduleView='lookahead';renderMain()">2-Week Look Ahead</button>`;
  TRADES.forEach(t=>{tabs+=`<button class="schedule-btn ${sv===t?"active":""}" onclick="state.scheduleView='${t}';renderMain()">${t}</button>`;});
  tabs+=`</div>`;

  let content="";
  if(sv==="global"){
    content=`<div class="card"><div class="card-title">Global Project Schedule</div>`;
    TRADES.forEach(t=>{
      const s=state.schedule[t];
      const col=s.progress===100?"var(--ag)":s.progress>0?"var(--ag2)":"var(--pk2)";
      content+=`<div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
        <div style="min-width:110px;font-family:var(--font);font-size:11px;font-weight:600">${t}</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${s.progress}%;background:${col}"></div></div>
        <span style="font-family:var(--font);font-size:11px;color:var(--txt2);min-width:35px">${s.progress}%</span>
        <span style="font-size:10px;color:var(--txt2)">${fmtDate(s.start)} - ${fmtDate(s.end)}</span></div>`;
    });
    content+=`</div>`;
  } else if(sv==="lookahead"){
    content=`<div class="card"><div class="card-title">2-Week Look Ahead</div><div style="font-size:13px;color:var(--txt2);margin-bottom:12px">${fmtDate(new Date())} → ${fmtDate(new Date(Date.now()+14*86400000))}</div>`;
    TRADES.forEach(trade=>{
      const scheduled=state.units.filter(u=>u.trades[trade]?.scheduled);
      const accessIssues=scheduled.filter(u=>u.trades[trade]?.accessDenied);
      if(!scheduled.length)return;
      content+=`<div class="card" style="padding:10px;margin-bottom:8px"><div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <span style="font-family:var(--font);font-size:12px;font-weight:700">${trade}</span>
        <span style="font-size:11px;color:var(--txt2)">${scheduled.length} units scheduled</span></div>
        <div style="display:flex;gap:4px;flex-wrap:wrap">${scheduled.map(u=>tagHTML(u.trades[trade].accessDenied?"#FF4D6D":"#70E000",u.unit+(u.trades[trade].accessDenied?" ⚠":""))).join("")}</div>
        ${accessIssues.length?`<div style="margin-top:6px;font-size:11px;color:var(--pk2)">⚠ ${accessIssues.length} unit(s) with access issues: ${accessIssues.map(u=>u.unit).join(", ")}</div>`:""}</div>`;
    });
    content+=`</div>`;
  } else if(TRADES.includes(sv)){
    const s=state.schedule[sv];
    content=`<div class="card"><div class="card-title">${sv} Schedule</div>
      <div style="display:flex;gap:12px;font-size:13px;margin-bottom:12px"><span>Start: <strong>${fmtDate(s.start)}</strong></span><span>End: <strong>${fmtDate(s.end)}</strong></span><span>Progress: <strong>${s.progress}%</strong></span></div>
      <div class="card-title">Units by Status</div>`;
    ["Not Started","In Progress","Complete"].forEach(status=>{
      const matching=state.units.filter(u=>u.trades[sv]?.status===status);
      content+=`<div style="margin-bottom:8px"><div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
        <div style="width:10px;height:10px;border-radius:2px;background:${tradeColor(status)}"></div>
        <span style="font-family:var(--font);font-size:11px;font-weight:600">${status} (${matching.length})</span></div>
        <div style="display:flex;gap:3px;flex-wrap:wrap">${matching.slice(0,40).map(u=>tagHTML(tradeColor(status),u.unit)).join("")}${matching.length>40?`<span style="font-size:10px;color:var(--txt2)">+${matching.length-40} more</span>`:""}</div></div>`;
    });
    content+=`</div>`;
  }
  m.innerHTML=tabs+content;
}

function renderField(m){
  const u=state.units;
  const typeColors={arrival:"#70E000",access:"#FF4D6D",progress:"#CDEB45",issue:"#FF4D6D",delivery:"#FF69B4",inspection:"#FFB3C6"};
  const denied=u.filter(x=>Object.values(x.trades).some(t=>t.accessDenied&&t.scheduled));
  const active=u.filter(x=>Object.values(x.trades).some(t=>t.status==="In Progress")).length;
  const complete=u.filter(x=>Object.values(x.trades).every(t=>t.status==="Complete")).length;
  const notStarted=u.filter(x=>Object.values(x.trades).every(t=>t.status==="Not Started")).length;
  const vacant=u.filter(x=>x.vacant).length;

  let eventsHTML=state.fieldEvents.map(e=>`<div style="display:flex;gap:8px;padding:8px 0;border-bottom:1px solid var(--bd)">
    <span style="font-family:var(--font);font-size:10px;color:var(--txt2);min-width:55px">${e.time}</span>
    <div style="width:8px;height:8px;border-radius:50%;background:${typeColors[e.type]||"var(--txt2)"};margin-top:4px;flex-shrink:0"></div>
    <div><span style="font-size:12px">${escHTML(e.msg)}</span><span style="font-size:10px;color:var(--ag);margin-left:6px">Unit ${e.unit}</span></div></div>`).join("");

  let deniedHTML=denied.length===0?`<div style="color:var(--ag);font-size:13px">✓ All scheduled units accessible</div>`:
    denied.map(x=>{const bt=Object.entries(x.trades).filter(([,t])=>t.accessDenied&&t.scheduled).map(([n])=>n);
    return `<div style="padding:6px 0;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center">
    <div><span style="font-family:var(--font);font-size:12px;font-weight:700;color:var(--pk2)">Unit ${x.unit}</span><span style="font-size:11px;color:var(--txt2);margin-left:8px">${x.contact.first} ${x.contact.last}</span></div>
    <div style="display:flex;gap:3px">${bt.map(t=>tagHTML("#FF4D6D",t)).join("")}</div></div>`;}).join("");

  m.innerHTML=`<div class="field-grid">
    <div class="card"><div class="card-title">📡 Live Field Events</div><div style="max-height:400px;overflow:auto">${eventsHTML}</div>
      <div style="display:flex;gap:8px;margin-top:12px"><input class="input" id="fieldInput" placeholder="Log field event...">
      <button class="btn btn-primary" onclick="addFieldEvent()">Log</button></div></div>
    <div>
      <div class="card"><div class="card-title">⚠ Access Denied Notifications</div>${deniedHTML}</div>
      <div class="card"><div class="card-title">📊 Today's Summary</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div style="background:var(--bg1);border-radius:6px;padding:12px;text-align:center"><div style="font-family:var(--font);font-size:28px;font-weight:800;color:var(--ag2)">${active}</div><div style="font-size:10px;color:var(--txt2);text-transform:uppercase;font-family:var(--font)">Active Units</div></div>
        <div style="background:var(--bg1);border-radius:6px;padding:12px;text-align:center"><div style="font-family:var(--font);font-size:28px;font-weight:800;color:var(--ag)">${complete}</div><div style="font-size:10px;color:var(--txt2);text-transform:uppercase;font-family:var(--font)">Completed</div></div>
        <div style="background:var(--bg1);border-radius:6px;padding:12px;text-align:center"><div style="font-family:var(--font);font-size:28px;font-weight:800;color:var(--pk2)">${notStarted}</div><div style="font-size:10px;color:var(--txt2);text-transform:uppercase;font-family:var(--font)">Not Started</div></div>
        <div style="background:var(--bg1);border-radius:6px;padding:12px;text-align:center"><div style="font-family:var(--font);font-size:28px;font-weight:800;color:var(--pk3)">${vacant}</div><div style="font-size:10px;color:var(--txt2);text-transform:uppercase;font-family:var(--font)">Vacant</div></div>
      </div></div></div></div>`;
}

function addFieldEvent(){
  const inp=document.getElementById("fieldInput");if(!inp.value)return;
  state.fieldEvents.unshift({time:new Date().toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}),type:"progress",msg:inp.value,unit:"—"});
  inp.value="";renderMain();
}

function renderCommon(m){
  let h=`<div class="common-grid">`;
  COMMON_AREAS.forEach(area=>{
    h+=`<div class="card"><div class="card-title">${area.icon} ${area.label}</div>`;
    area.items.forEach(item=>{
      const key=`${area.id}-${item}`;
      const data=state.commonAreas[key]||{status:"Not Started",trades:{}};
      h+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--bd)">
        <span style="font-size:12px">${item}</span><div style="display:flex;gap:4px;align-items:center">
        <div style="width:10px;height:10px;border-radius:2px;background:${tradeColor(data.status)}"></div>
        <select class="select" style="font-size:10px;padding:2px 6px" onchange="state.commonAreas['${key}']={...state.commonAreas['${key}']||{trades:{}},status:this.value};renderMain()">
          <option${data.status==="Not Started"?" selected":""}>Not Started</option><option${data.status==="In Progress"?" selected":""}>In Progress</option><option${data.status==="Complete"?" selected":""}>Complete</option>
        </select></div></div>`;
    });
    h+=`</div>`;
  });
  h+=`</div>`;
  m.innerHTML=h;
}

function renderNotices(m){
  const u=state.units;const maxFloor=Math.max(...u.map(x=>x.floor));
  let unitBtns=u.map(x=>`<button class="btn ${state.bulkSelected.includes(x.id)?"btn-primary":""}" style="font-size:9px;padding:2px 6px" onclick="toggleBulkUnit(${x.id})">${x.unit}</button>`).join("");
  let tradeBtns=TRADES.map(t=>`<button class="btn ${state.bulkTrades.includes(t)?"btn-primary":""}" style="font-size:10px;padding:4px 8px" onclick="toggleBulkTrade('${t}')">${t}</button>`).join("");
  let floorOpts="";for(let i=1;i<=maxFloor;i++)floorOpts+=`<option value="${i}">Floor ${i}</option>`;

  m.innerHTML=`<div class="card"><div class="card-title">📋 Bulk Notice Distribution</div>
    <div style="margin-bottom:12px"><label class="field-label">Select Units</label>
      <div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap">
        <button class="btn ${state.bulkSelected.length===u.length?"btn-primary":""}" onclick="toggleAllBulk()">${state.bulkSelected.length===u.length?"Deselect All":"Select All"}</button>
        <select class="select" onchange="selectBulkFloor(this.value)"><option value="">Select Floor...</option>${floorOpts}</select>
        <span style="font-size:11px;color:var(--txt2);align-self:center">${state.bulkSelected.length} units selected</span></div>
      <div style="display:flex;gap:3px;flex-wrap:wrap;max-height:100px;overflow:auto">${unitBtns}</div></div>
    <div class="two-col"><div><label class="field-label">Work Start</label><input type="date" class="input" id="bulkStart"></div>
      <div><label class="field-label">Work End</label><input type="date" class="input" id="bulkEnd"></div></div>
    <div style="margin-top:8px"><label class="field-label">Trades</label><div style="display:flex;gap:4px;flex-wrap:wrap">${tradeBtns}</div></div>
    <div style="margin-top:8px"><label class="field-label">Notice Content</label>
      <textarea class="textarea" id="bulkNotice" placeholder="Dear Resident, please be advised that construction work is scheduled for your unit..." spellcheck="true"></textarea></div>
    <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
      <select class="select" id="bulkMethod"><option value="print">🖨️ Print All</option><option value="email">📧 Email All</option><option value="text">📱 Text All</option></select>
      <button class="btn btn-primary" onclick="sendBulkNotice()">Send to ${state.bulkSelected.length} Units</button>
      <button class="btn btn-success" onclick="alert('📁 '+state.bulkSelected.length+' notice files saved to Desktop/Notices/')">💾 Save All to Desktop</button></div></div>`;
}

function toggleBulkUnit(id){state.bulkSelected=state.bulkSelected.includes(id)?state.bulkSelected.filter(x=>x!==id):[...state.bulkSelected,id];renderMain();}
function toggleAllBulk(){state.bulkSelected=state.bulkSelected.length===state.units.length?[]:state.units.map(u=>u.id);renderMain();}
function selectBulkFloor(f){if(!f)return;const ids=state.units.filter(u=>u.floor===parseInt(f)).map(u=>u.id);const all=ids.every(id=>state.bulkSelected.includes(id));state.bulkSelected=all?state.bulkSelected.filter(id=>!ids.includes(id)):[...new Set([...state.bulkSelected,...ids])];renderMain();}
function toggleBulkTrade(t){state.bulkTrades=state.bulkTrades.includes(t)?state.bulkTrades.filter(x=>x!==t):[...state.bulkTrades,t];renderMain();}
function sendBulkNotice(){const method=document.getElementById("bulkMethod").value;alert(`📋 ${state.bulkSelected.length} notices ${method==="print"?"sent to printer":method==="email"?"emailed":"texted"}\n\n📁 All notices saved to Desktop/Notices/ folder`);}

// ─── UNIT MODAL ───────────────────────────────────
function openUnit(id){
  state.selectedUnit=state.units.find(u=>u.id===id);
  state.modalTab="info";
  renderModal();
  document.getElementById("modal").style.display="flex";
}
function closeModal(){document.getElementById("modal").style.display="none";state.selectedUnit=null;}

function renderModal(){
  const u=state.selectedUnit;if(!u)return;
  const tabs=["info","trades","comments","photos","notices"];
  let tabsHTML=`<div class="modal-tabs">${tabs.map(t=>`<button class="modal-tab ${state.modalTab===t?"active":""}" onclick="state.modalTab='${t}';renderModal()">${t.charAt(0).toUpperCase()+t.slice(1)}</button>`).join("")}</div>`;

  let body="";
  if(state.modalTab==="info"){
    body=`<div class="card-title">Contact Information</div>
      <div class="two-col">
        <div><label class="field-label">First Name</label><input class="input" value="${escHTML(u.contact.first)}" onchange="updateContact(${u.id},'first',this.value)"></div>
        <div><label class="field-label">Last Name</label><input class="input" value="${escHTML(u.contact.last)}" onchange="updateContact(${u.id},'last',this.value)"></div>
        <div><label class="field-label">Phone</label><input class="input" value="${escHTML(u.contact.phone)}" onchange="updateContact(${u.id},'phone',this.value)"></div>
        <div><label class="field-label">Email</label><input class="input" value="${escHTML(u.contact.email)}" onchange="updateContact(${u.id},'email',this.value)"></div>
        <div><label class="field-label">Unit Number</label><input class="input" value="${u.unit}" readonly></div>
        <div><label class="field-label">Floor</label><input class="input" value="${u.floor}" readonly></div></div>
      <div style="margin-top:12px"><label style="display:flex;align-items:center;gap:8px;cursor:pointer">
        <input type="checkbox" ${u.vacant?"checked":""} onchange="toggleVacant(${u.id},this.checked)"><span style="font-size:13px">Unit is Vacant</span></label></div>`;
  } else if(state.modalTab==="trades"){
    body=TRADES.map(trade=>{const t=u.trades[trade];
      return `<div class="card trade-row"><div style="min-width:110px"><span style="font-family:var(--font);font-size:12px;font-weight:700">${trade}</span></div>
        <select class="select" onchange="updateTrade(${u.id},'${trade}','status',this.value)"><option${t.status==="Not Started"?" selected":""}>Not Started</option><option${t.status==="In Progress"?" selected":""}>In Progress</option><option${t.status==="Complete"?" selected":""}>Complete</option></select>
        <select class="select" onchange="updateTrade(${u.id},'${trade}','phase',this.value)">${PHASES.map(p=>`<option${t.phase===p?" selected":""}>${p}</option>`).join("")}</select>
        <div style="display:flex;align-items:center;gap:6px"><div style="width:14px;height:14px;border-radius:3px;background:${tradeColor(t.status)}"></div>
        ${t.accessDenied?tagHTML("#FF4D6D","⚠ NO ACCESS"):""}</div>
        <label style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--txt2)"><input type="checkbox" ${t.accessDenied?"checked":""} onchange="updateTrade(${u.id},'${trade}','accessDenied',this.checked)"> Access Denied</label></div>`;
    }).join("");
  } else if(state.modalTab==="comments"){
    const commentsHTML=u.comments.length===0?`<div style="color:var(--txt2);font-size:13px">No comments yet</div>`:
      u.comments.map(c=>`<div class="card" style="padding:10px"><div style="font-size:10px;color:var(--txt2);margin-bottom:4px;font-family:var(--font)">${fmtDate(c.date)} • ${c.type==="voice"?"🎤 Voice":"💬 Text"}</div><div style="font-size:13px">${escHTML(c.text)}</div></div>`).join("");
    body=`<div style="margin-bottom:12px"><textarea class="textarea" id="commentInput" placeholder="Add a comment..." spellcheck="true"></textarea>
      <div style="display:flex;gap:8px;margin-top:8px"><button class="btn btn-primary" onclick="addComment(${u.id})">💬 Add Comment</button>
      <button class="btn" id="voiceBtn" onclick="voiceRecord(${u.id})">🎤 Voice Record</button></div></div>
      <div style="max-height:300px;overflow:auto">${commentsHTML}</div>`;
  } else if(state.modalTab==="photos"){
    const photosHTML=u.photos.length===0?`<div style="color:var(--txt2);font-size:13px">No photos yet</div>`:
      `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px">${u.photos.map((p,i)=>
        `<div class="card" style="padding:8px;text-align:center"><div style="background:var(--bd);border-radius:4px;height:80px;display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:6px">📸</div>
        <div style="font-size:10px;color:var(--pk);font-family:var(--font)">${escHTML(p.annotation)}</div>
        <div style="font-size:9px;color:var(--txt2)">${fmtDate(p.date)}</div>
        <button class="btn" style="font-size:10px;padding:2px 8px;margin-top:4px" onclick="togglePhotoMark(${u.id},${i})">${p.marked?"✅ Marked":"✏️ Annotate"}</button></div>`).join("")}</div>`;
    body=`<div style="margin-bottom:12px"><input class="input" id="photoAnnotation" placeholder="Photo annotation / description...">
      <button class="btn btn-primary" style="margin-top:8px" onclick="addPhoto(${u.id})">📷 Add Photo</button></div>${photosHTML}`;
  } else if(state.modalTab==="notices"){
    let tradeBtns=TRADES.map(t=>`<button class="btn ${state.noticeTrades.includes(t)?"btn-primary":""}" style="font-size:10px;padding:4px 8px" onclick="toggleNoticeTrade('${t}')">${t}</button>`).join("");
    body=`<div class="card-title">Generate Notice</div>
      <div style="margin-bottom:8px"><label class="field-label">Work Schedule</label><div style="display:flex;gap:8px">
        <input type="date" class="input" id="noticeStart"><span style="color:var(--txt2);align-self:center">to</span><input type="date" class="input" id="noticeEnd"></div></div>
      <div style="margin-bottom:8px"><label class="field-label">Trades Involved</label><div style="display:flex;gap:4px;flex-wrap:wrap">${tradeBtns}</div></div>
      <div style="margin-bottom:8px"><label class="field-label">Notice Content</label><textarea class="textarea" id="noticeContent" placeholder="Dear Resident, work will begin in your unit..." spellcheck="true"></textarea></div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <select class="select" id="noticeMethod"><option value="print">🖨️ Print</option><option value="email">📧 Email</option><option value="text">📱 Text Message</option></select>
        <button class="btn btn-primary" onclick="sendUnitNotice(${u.id})">📋 Generate & Send Notice</button>
        <span style="font-size:10px;color:var(--txt2)">File saved to Desktop/Notices/</span></div>`;
  }

  document.getElementById("modalContent").innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div><h2 style="font-family:var(--font);color:var(--pk);margin:0;font-size:20px">UNIT ${u.unit}</h2>
        ${tagHTML(u.vacant?"#FFB3C6":"#70E000",u.vacant?"VACANT":"OCCUPIED")}</div>
      <button class="btn" onclick="closeModal()">✕ Close</button></div>${tabsHTML}${body}`;
}

// ─── DATA MUTATIONS ───────────────────────────────
function updateContact(id,field,val){const u=state.units.find(x=>x.id===id);u.contact[field]=val;state.selectedUnit=u;}
function toggleVacant(id,val){const u=state.units.find(x=>x.id===id);u.vacant=val;state.selectedUnit=u;renderModal();renderMain();}
function updateTrade(id,trade,field,val){const u=state.units.find(x=>x.id===id);if(field==="accessDenied")u.trades[trade][field]=val;else u.trades[trade][field]=val;state.selectedUnit=u;renderModal();renderMain();}
function addComment(id){const inp=document.getElementById("commentInput");if(!inp.value.trim())return;const u=state.units.find(x=>x.id===id);u.comments.push({text:inp.value,date:new Date().toISOString(),type:"text"});state.selectedUnit=u;renderModal();}
function voiceRecord(id){const btn=document.getElementById("voiceBtn");btn.textContent="🔴 Recording...";btn.classList.add("btn-danger");
  setTimeout(()=>{const u=state.units.find(x=>x.id===id);u.comments.push({text:"🎤 [Voice transcription] Inspected unit - plumbing rough-in looks good, electrical panel needs attention on south wall.",date:new Date().toISOString(),type:"voice"});state.selectedUnit=u;renderModal();},2000);}
function addPhoto(id){const inp=document.getElementById("photoAnnotation");const u=state.units.find(x=>x.id===id);u.photos.push({id:Date.now(),annotation:inp.value||"Site photo",date:new Date().toISOString(),marked:false});state.selectedUnit=u;renderModal();}
function togglePhotoMark(id,idx){const u=state.units.find(x=>x.id===id);u.photos[idx].marked=!u.photos[idx].marked;state.selectedUnit=u;renderModal();}
function toggleNoticeTrade(t){state.noticeTrades=state.noticeTrades.includes(t)?state.noticeTrades.filter(x=>x!==t):[...state.noticeTrades,t];renderModal();}
function sendUnitNotice(id){const method=document.getElementById("noticeMethod").value;const u=state.units.find(x=>x.id===id);
  alert(`📋 Notice ${method==="print"?"sent to printer":method==="email"?"emailed to "+u.contact.email:"texted to "+u.contact.phone}\n\n📁 Notice saved to Desktop/Notices/ folder`);}

// ─── INIT ─────────────────────────────────────────
state.units=genUnits(25,"alpha",5);
state.schedule=genSchedule();
initConfig();renderSidebar();renderMain();
</script>
</body>
</html>
