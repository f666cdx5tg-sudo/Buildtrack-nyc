<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuildTrack NYC - STM PRO BUILD</title>
    <style>
        /* BASE STYLES */
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0A0A0E; color: #E8E4D0; font-family: 'DM Sans', sans-serif;}
        #root{min-height:100vh}

        /* PRINT STYLES - Professional Formatting for Notices */
        @media print {
            body { background: white !important; color: black !important; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif !important; }
            #root > div > div:first-child, .sidebar, button, select, input, .no-print { display: none !important; }
            .modal-inner { position: static !important; width: 100% !important; border: none !important; padding: 0 !important; background: white !important; box-shadow: none !important; }
            .print-header { display: block !important; margin-bottom: 20px; border-bottom: 2px solid black; padding-bottom: 10px; text-align: center; }
            .notice-content { font-size: 14pt !important; line-height: 1.6 !important; margin-top: 20px; }
            .tag { border: 1px solid #000 !important; color: #000 !important; background: transparent !important; }
        }
        .print-header { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        /* --- DATA & CONSTANTS --- */
        const TRADES = ["Plumbing","Carpentry","Windows","Electrical","Painting","Heating","Cooling","Tiling","Minor Repairs","Major Repairs"];
        const PHASES = ["Pending","Demolition","Rough-In","Installation","Finishing","Inspection","Complete"];
        const STATUS_COLORS = { "Pending":"#FFFFFF", "Started":"#E74C3C", "In Progress":"#F1C40F", "Complete":"#27AE60", "Vacant":"#FF8C00" };

        const generateUnits = (floors, perFloor, format) => {
            const units = [];
            for (let i = 0; i < (floors * perFloor); i++) {
                const floorNum = Math.floor(i / perFloor) + 1;
                const pos = i % perFloor;
                let unitLabel = format === "alpha" ? `${floorNum}${String.fromCharCode(65 + pos)}` : `${floorNum}${String(pos + 1).padStart(2, "0")}`;
                const trades = {};
                TRADES.forEach(t => {
                    trades[t] = { status: "Pending", phase: "Pending", contractor: "", scheduled: false, accessDenied: false };
                });
                units.push({
                    id: i + 1, unit: unitLabel, floor: floorNum, vacant: false,
                    contact: { first: "Resident", last: "Name", phone: "", email: "" },
                    trades, comments: [], photos: [], notices: []
                });
            }
            return units;
        };

        /* --- APP COMPONENT --- */
        function App() {
            const [units, setUnits] = useState(() => {
                const saved = localStorage.getItem('buildtrack_units');
                return saved ? JSON.parse(saved) : generateUnits(5, 8, "alpha");
            });

            const [commonAreas, setCommonAreas] = useState(() => {
                const saved = localStorage.getItem('buildtrack_common');
                return saved ? JSON.parse(saved) : {};
            });

            useEffect(() => {
                localStorage.setItem('buildtrack_units', JSON.stringify(units));
                localStorage.setItem('buildtrack_common', JSON.stringify(commonAreas));
            }, [units, commonAreas]);

            return (
                <div style={{display: 'flex', flexDirection: 'column', minHeight: '100vh'}}>
                    <div className="print-header">
                        <h1 style={{fontSize: '24pt', fontWeight: 'bold'}}>STM PRO BUILD - OFFICIAL NOTICE</h1>
                        <p style={{fontSize: '14pt'}}>Project: 456 Grand Ave — Full Building Renovation</p>
                    </div>
                    
                    <header style={{background: '#0D0D1A', borderBottom: '3px solid #FF69B4', padding: '20px', textAlign: 'center'}}>
                        <h1 style={{color: '#FADA5E', margin: 0}}>BUILDTRACK <span style={{color: '#FF69B4'}}>NYC</span></h1>
                        <p style={{color: '#E8E4D0'}}>456 Grand Ave — Full Building Renovation</p>
                    </header>

                    <main style={{flex: 1, padding: '20px', textAlign: 'center'}}>
                        <p>Dashboard is active. Your data is being saved locally.</p>
                        <button onClick={() => window.print()} style={{padding: '10px 20px', background: '#FADA5E', border: 'none', borderRadius: '5px', cursor: 'pointer', fontWeight: 'bold'}}>Test Print Notice</button>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
