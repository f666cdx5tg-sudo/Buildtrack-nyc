const TRADES = ["Plumbing","Carpentry","Windows","Electrical","Painting","Heating","Cooling","Tiling","Minor Repairs","Major Repairs"];
const PHASES = ["Pending","Demolition","Rough-In","Installation","Finishing","Inspection","Complete"];
const STATUS_COLORS = { "Pending":"#FFFFFF", "Started":"#E74C3C", "In Progress":"#F1C40F", "Complete":"#27AE60", "Vacant":"#FF8C00" };
const DEFAULT_COMMON_AREAS = [
  { id:"elev", label:"Elevators", icon:"🛗", items:["Car 1","Car 2","Car 3","Car 4"] },
  { id:"roof", label:"Roof", icon:"🏗️", items:["Main Roof","Bulkhead","Water Tower","Antenna Platform"] },
  { id:"base", label:"Basement", icon:"🔧", items:["Boiler Room","Storage","Laundry","Mechanical"] },
  { id:"grnd", label:"Grounds", icon:"🌳", items:["Front Entrance","Courtyard","Parking","Sidewalk"] },
];

const randomName = () => {
  const f = ["Maria","James","Wei","Fatima","Carlos","Sarah","David","Priya","Ahmed","Linda","John","Ana","Michael","Olga","Roberto"];
  const l = ["Rodriguez","Chen","Williams","Patel","Kim","Johnson","Martinez","Lee","Brown","Singh","Garcia","Thompson","Nguyen","Davis","Wilson"];
  return { first: f[Math.floor(Math.random()*f.length)], last: l[Math.floor(Math.random()*l.length)] };
};

const getLetterLabel = (index) => {
  // 0=A, 1=B, ... 25=Z, 26=AA, 27=AB, ...
  let label = "";
  let n = index;
  do {
    label = String.fromCharCode(65 + (n % 26)) + label;
    n = Math.floor(n / 26) - 1;
  } while (n >= 0);
  return label;
};

const generateUnits = (floors, perFloor, format = "alpha") => {
  const units = [];
  const total = floors * perFloor;
  for (let i = 0; i < total; i++) {
    const floorNum = Math.floor(i / perFloor) + 1;
    const posOnFloor = i % perFloor;
    let unitLabel;
    if (format === "alpha") {
      unitLabel = `${floorNum}${getLetterLabel(posOnFloor)}`;
    } else {
      unitLabel = `${floorNum}${String(posOnFloor + 1).padStart(2, "0")}`;
    }
    const isVacant = Math.random() < 0.12;
    const name = randomName();
    const trades = {};
    TRADES.forEach(t => {
      const r = Math.random();
      trades[t] = {
        status: r < 0.2 ? "Pending" : r < 0.4 ? "Started" : r < 0.7 ? "In Progress" : "Complete",
        phase: PHASES[Math.floor(Math.random() * PHASES.length)],
        contractor: "",
        scheduled: Math.random() < 0.4,
        accessDenied: Math.random() < 0.08,
      };
    });
    units.push({
      id: i + 1, unit: unitLabel, floor: floorNum,
      vacant: isVacant,
      contact: {
        first: isVacant ? "" : name.first,
        last: isVacant ? "" : name.last,
        phone: isVacant ? "" : `(212) 555-${String(Math.floor(Math.random()*9000)+1000)}`,
        email: isVacant ? "" : `${name.first.toLowerCase()}.${name.last.toLowerCase()}@email.com`,
      },
      trades,
      comments: [],
      photos: [],
      notices: [],
    });
  }
  return units;
};

const generateSchedule = () => {
  const schedule = {};
  const today = new Date();
  TRADES.forEach(t => {
    const start = new Date(today);
    start.setDate(start.getDate() + Math.floor(Math.random() * 14));
    const end = new Date(start);
    end.setDate(end.getDate() + Math.floor(Math.random() * 60) + 30);
    schedule[t] = {
      start: start.toISOString().split("T")[0],
      end: end.toISOString().split("T")[0],
      progress: Math.floor(Math.random() * 100),
    };
  });
  return schedule;
};

// ─── HELPERS ────────────────────────────────────────────────────────────────
const getUnitColor = (unit) => {
  if (unit.vacant) return STATUS_COLORS["Vacant"];
  const statuses = Object.values(unit.trades).map(t => t.status);
  if (statuses.every(s => s === "Complete")) return STATUS_COLORS["Complete"];
  if (statuses.every(s => s === "Pending")) return STATUS_COLORS["Pending"];
  if (statuses.some(s => s === "In Progress")) return STATUS_COLORS["In Progress"];
  if (statuses.some(s => s === "Started")) return STATUS_COLORS["Started"];
  return STATUS_COLORS["In Progress"];
};

const getTradeColor = (status) => STATUS_COLORS[status] || TXT2;

const getDaysFromNow = (dateStr) => {
  const d = new Date(dateStr);
  const now = new Date();
  return Math.ceil((d - now) / (1000 * 60 * 60 * 24));
};

const formatDate = (d) => new Date(d).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });

// ▸ Legend Bar
const Legend = () => (
  <div style={S.legend}>
    {Object.entries(STATUS_COLORS).map(([label, color]) => (
      <div key={label} style={S.legendItem(color)}>
        <div style={S.legendDot(color)} />
        <span>{label}</span>
      </div>
    ))}
    <div style={S.legendItem(PK2)}>
      <div style={{ ...S.legendDot(PK2), width: 10, height: 10, borderRadius: "50%" }} />
      <span>Access Denied</span>
    </div>
  </div>
);

// ▸ Building Map (NYC Cross-Section with Common Areas)
const UnitGrid = ({ units, onSelect, selectedId, tradeFilter, commonAreas, setCommonAreas, areaList, showAreas }) => {
  const [statusFilter, setStatusFilter] = useState("");
  const [search, setSearch] = useState("");
  const [editingCA, setEditingCA] = useState(null);
  const maxFloor = Math.max(...units.map(u => u.floor));
  const perFloor = Math.ceil(units.length / maxFloor);

  let filtered = units;
  if (statusFilter === "Vacant") filtered = filtered.filter(u => u.vacant);
  else if (statusFilter === "Pending") filtered = filtered.filter(u => !u.vacant && Object.values(u.trades).every(t => t.status === "Pending"));
  else if (statusFilter === "Started") filtered = filtered.filter(u => !u.vacant && Object.values(u.trades).some(t => t.status === "Started"));
  else if (statusFilter === "In Progress") filtered = filtered.filter(u => !u.vacant && Object.values(u.trades).some(t => t.status === "In Progress"));
  else if (statusFilter === "Complete") filtered = filtered.filter(u => !u.vacant && Object.values(u.trades).every(t => t.status === "Complete"));
  if (search) filtered = filtered.filter(u => u.unit.toLowerCase().includes(search.toLowerCase()) || `${u.contact.first} ${u.contact.last}`.toLowerCase().includes(search.toLowerCase()));
  if (tradeFilter) {
    filtered = filtered.map(u => ({ ...u, _color: u.vacant ? STATUS_COLORS["Vacant"] : getTradeColor(u.trades[tradeFilter]?.status) }));
  }
  const filteredIds = new Set(filtered.map(u => u.id));
  const floors = {};
  units.forEach(u => { if (!floors[u.floor]) floors[u.floor] = []; floors[u.floor].push(u); });
  const floorNums = Object.keys(floors).map(Number).sort((a, b) => b - a);

  // Common area helpers
  const getCAStatus = (areaId, item) => (commonAreas[`${areaId}-${item}`]?.status) || "Pending";
  const getCAColor = (areaId, item) => getTradeColor(getCAStatus(areaId, item));
  const caItems = (id) => (areaList.find(a => a.id === id)?.items) || [];
  const cycleCAStatus = (key) => {
    const order = ["Pending","Started","In Progress","Complete"];
    const cur = commonAreas[key]?.status || "Pending";
    const next = order[(order.indexOf(cur) + 1) % order.length];
    setCommonAreas({ ...commonAreas, [key]: { ...commonAreas[key], status: next, trades: commonAreas[key]?.trades || {} } });
  };

  const uW = 72, uH = 54, pad = 8;
  const floorH = uH + pad * 2 + 4;
  const bodyW = perFloor * (uW + pad) + pad + 50;
  const elevW = 55;
  const totalW = bodyW + elevW + 30;
  const bodyH = maxFloor * floorH;
  const roofH = 20, parapetH = 18;
  const wtH = 75;
  const stepsH = 55;
  const bsmtH = 100;
  const bulkH = 40;
  const totalH = wtH + bulkH + parapetH + roofH + bodyH + stepsH + bsmtH + 40;
  const bx = 15, by = wtH + bulkH + parapetH + roofH;
  const OL = "#C0C8D4";
  const WALL = "#1C1C2E";
  const DARK = "#111120";

  return (
    <div>
      <div style={{ display: "flex", gap: 8, marginBottom: 16, flexWrap: "wrap", alignItems: "center" }}>
        <input style={{ ...S.input, width: 160 }} placeholder="Search unit or name..." value={search} onChange={e => setSearch(e.target.value)} />
        <select style={S.select} value={statusFilter} onChange={e => setStatusFilter(e.target.value)}>
          <option value="">All Status</option>
          <option>Vacant</option><option>Pending</option><option>Started</option><option>In Progress</option><option>Complete</option>
        </select>
        <span style={{ fontSize: 11, color: TXT2, fontFamily: font }}>{filtered.length} / {units.length} units</span>
      </div>

      <div style={{ display: "flex", justifyContent: "center", overflow: "auto" }}>
        <svg viewBox={`0 0 ${totalW} ${totalH}`} style={{ width: "100%", maxWidth: totalW * 1.3, minWidth: 500 }}
          xmlns="http://www.w3.org/2000/svg" fontFamily={font}>

          {/* ═══ WATER TOWER ═══ */}
          {(() => {
            const wx = bx + bodyW - 40, wy = 5;
            return (<g>
              <path d={`M${wx} ${wy+30} L${wx+5} ${wy+12} L${wx+45} ${wy+12} L${wx+50} ${wy+30} Z`} fill={DARK} stroke={OL} strokeWidth="1.5" />
              <path d={`M${wx+3} ${wy+12} L${wx+25} ${wy+2} L${wx+47} ${wy+12}`} fill="none" stroke={OL} strokeWidth="1.5" />
              <line x1={wx+25} y1={wy+2} x2={wx+25} y2={wy-4} stroke={OL} strokeWidth="1" />
              {[0,1,2,3].map(i => <line key={i} x1={wx+4+i*2} y1={wy+14+i*4} x2={wx+46-i*2} y2={wy+14+i*4} stroke={OL} strokeWidth="0.5" opacity="0.4" />)}
              <line x1={wx+10} y1={wy+30} x2={wx+5} y2={wy+wtH-5} stroke={OL} strokeWidth="2" />
              <line x1={wx+40} y1={wy+30} x2={wx+45} y2={wy+wtH-5} stroke={OL} strokeWidth="2" />
              <line x1={wx+10} y1={wy+35} x2={wx+40} y2={wy+55} stroke={OL} strokeWidth="0.8" />
              <line x1={wx+40} y1={wy+35} x2={wx+10} y2={wy+55} stroke={OL} strokeWidth="0.8" />
              <text x={wx+56} y={wy+20} fill={AG} fontSize="9" fontWeight="700">WATER</text>
              <text x={wx+56} y={wy+30} fill={AG} fontSize="9" fontWeight="700">TOWER</text>
            </g>);
          })()}

          {/* ═══ BULKHEAD ═══ */}
          {(() => {
            const bhx = bx + bodyW/3, bhy = by - parapetH - bulkH;
            return (<g>
              <rect x={bhx} y={bhy} width={bodyW/4} height={bulkH} fill={WALL} stroke={OL} strokeWidth="2.5" />
              <rect x={bhx+4} y={bhy+6} width={bodyW/4-8} height={bulkH-10} fill={DARK} stroke={OL} strokeWidth="1" opacity="0.6" />
              <line x1={bhx} y1={bhy} x2={bhx+bodyW/4} y2={bhy} stroke={PK} strokeWidth="2" />
              <text x={bhx+bodyW/8} y={bhy+bulkH/2+4} textAnchor="middle" fill={AG} fontSize="9" fontWeight="700">BULKHEAD</text>
            </g>);
          })()}

          {/* ═══ PARAPET / ROOF ═══ */}
          <rect x={bx} y={by-parapetH} width={bodyW} height={parapetH} fill={WALL} stroke={OL} strokeWidth="2.5" />
          <line x1={bx} y1={by-parapetH} x2={bx+bodyW} y2={by-parapetH} stroke={PK} strokeWidth="3" />
          <text x={bx+bodyW/2} y={by-5} textAnchor="middle" fill={TXT2} fontSize="9" fontWeight="600">ROOF</text>

          {/* ═══ BUILDING BODY ═══ */}
          <rect x={bx} y={by} width={bodyW} height={bodyH} fill={WALL} stroke={OL} strokeWidth="3" />
          <line x1={bx+5} y1={by} x2={bx+5} y2={by+bodyH} stroke={OL} strokeWidth="1" opacity="0.4" />
          <line x1={bx+bodyW-5} y1={by} x2={bx+bodyW-5} y2={by+bodyH} stroke={OL} strokeWidth="1" opacity="0.4" />

          {/* ═══ ELEVATOR SHAFT (right side column) ═══ */}
          <rect x={bx+bodyW} y={by-parapetH-bulkH} width={elevW} height={bodyH+parapetH+bulkH+stepsH+bsmtH} fill={DARK} stroke={OL} strokeWidth="3" />
          <line x1={bx+bodyW+elevW/2} y1={by} x2={bx+bodyW+elevW/2} y2={by+bodyH+stepsH+bsmtH} stroke={OL} strokeWidth="0.8" opacity="0.3" />
          <text x={bx+bodyW+elevW/2} y={by+bodyH/2} textAnchor="middle" fill={PK} fontSize="10" fontWeight="700"
            transform={`rotate(-90,${bx+bodyW+elevW/2},${by+bodyH/2})`}>ELEVATOR SHAFT</text>
          {floorNums.map((f, i) => {
            const fy = by + i * floorH + floorH/2;
            return <rect key={f} x={bx+bodyW+10} y={fy-7} width={elevW-20} height={14} rx="2" fill={AG+"20"} stroke={AG+"40"} strokeWidth="0.5" />;
          })}

          {/* ═══ FLOORS WITH UNITS ═══ */}
          {floorNums.map((floorNum, fi) => {
            const fy = by + fi * floorH;
            const floorUnits = floors[floorNum];
            const isGround = floorNum === 1;
            return (<g key={floorNum}>
              <line x1={bx} y1={fy} x2={bx+bodyW} y2={fy} stroke={OL} strokeWidth="1" opacity="0.5" />
              <rect x={bx+6} y={fy+floorH/2-14} width={38} height={28} rx="4"
                fill={isGround ? AG+"30" : DARK} stroke={isGround ? AG : OL} strokeWidth="1.5" />
              <text x={bx+25} y={fy+floorH/2+5} textAnchor="middle"
                fill={isGround ? AG : "#E8E4D0"} fontSize="16" fontWeight="800">
                {isGround ? "L" : `F${floorNum}`}
              </text>
              {floorUnits.map((u, ui) => {
                const vis = filteredIds.has(u.id);
                let color;
                if (tradeFilter) color = u.vacant ? STATUS_COLORS["Vacant"] : getTradeColor(u.trades[tradeFilter]?.status);
                else color = getUnitColor(u);
                const hasAcc = Object.values(u.trades).some(t => t.accessDenied && t.scheduled);
                const sel = selectedId === u.id;
                const ux = bx + 48 + ui * (uW + pad);
                const uy = fy + pad;
                return (<g key={u.id} onClick={() => onSelect(u)} style={{ cursor: "pointer" }}>
                  <rect x={ux} y={uy} width={uW} height={uH} rx="2"
                    fill={vis ? color : "#08080F"} stroke={sel ? "#FFF" : OL}
                    strokeWidth={sel ? "3" : "1.5"} opacity={vis ? 1 : 0.12} />
                  {vis && <>
                    <line x1={ux+uW/2} y1={uy} x2={ux+uW/2} y2={uy+uH} stroke={OL} strokeWidth="0.6" opacity="0.35" />
                    <line x1={ux} y1={uy+uH/2} x2={ux+uW} y2={uy+uH/2} stroke={OL} strokeWidth="0.6" opacity="0.35" />
                  </>}
                  <rect x={ux-2} y={uy+uH} width={uW+4} height={3} rx="1" fill={OL} opacity="0.25" />
                  <text x={ux+uW/2} y={uy+uH/2+4} textAnchor="middle"
                    fill={vis ? (color==="#FFFFFF"||color==="#F1C40F"?"#000":"#FFF") : "#222"}
                    fontSize="12" fontWeight="700" opacity={vis?1:0.15}>
                    {u.unit}
                  </text>
                  {hasAcc && vis && <circle cx={ux+uW-5} cy={uy+5} r="5" fill="#E74C3C" stroke={WALL} strokeWidth="1" />}
                </g>);
              })}
            </g>);
          })}

          {/* ═══ GROUND LINE ═══ */}
          <line x1={0} y1={by+bodyH+stepsH-5} x2={totalW} y2={by+bodyH+stepsH-5} stroke={AG} strokeWidth="2.5" />
          {Array.from({length:10}).map((_,i) => (
            <line key={i} x1={i*14} y1={by+bodyH+stepsH-5} x2={i*14-8} y2={by+bodyH+stepsH+5} stroke={OL} strokeWidth="0.6" opacity="0.2" />
          ))}

          {/* ═══ ENTRANCE + STOOP ═══ */}
          {(() => {
            const ey = by + bodyH;
            const cx = bx + bodyW/2;
            return (<g>
              <rect x={bx} y={ey} width={bodyW} height={stepsH} fill={WALL} stroke={OL} strokeWidth="3" />
              <rect x={cx-25} y={ey+6} width={50} height={stepsH-6} rx="2" fill={DARK} stroke={OL} strokeWidth="1.2" />
              <rect x={cx-20} y={ey+10} width={18} height={34} rx="1" fill="none" stroke={OL} strokeWidth="0.6" opacity="0.5" />
              <rect x={cx+2} y={ey+10} width={18} height={34} rx="1" fill="none" stroke={OL} strokeWidth="0.6" opacity="0.5" />
              <circle cx={cx-4} cy={ey+30} r="2" fill={PK} />
              <circle cx={cx+4} cy={ey+30} r="2" fill={PK} />
              {[0,1,2].map(i => (
                <rect key={i} x={cx-30-i*7} y={ey+stepsH-14+i*5} width={60+i*14} height={4} fill={WALL} stroke={OL} strokeWidth="0.8" />
              ))}
              <line x1={cx-28} y1={ey+12} x2={cx-28} y2={ey+stepsH} stroke={OL} strokeWidth="1.5" />
              <line x1={cx+28} y1={ey+12} x2={cx+28} y2={ey+stepsH} stroke={OL} strokeWidth="1.5" />
              <text x={cx} y={ey+stepsH+14} textAnchor="middle" fill={TXT2} fontSize="8" fontWeight="600" letterSpacing="2">MAIN ENTRANCE</text>
            </g>);
          })()}

          {/* ═══ BASEMENT ═══ */}
          {(() => {
            const by2 = by + bodyH + stepsH;
            const bw = bodyW + elevW;
            return (<g>
              <rect x={bx} y={by2} width={bw} height={bsmtH} fill={DARK} stroke={OL} strokeWidth="2.5" strokeDasharray="5,3" />
              <line x1={bx-8} y1={by2} x2={bx-8} y2={by2+bsmtH+12} stroke={OL} strokeWidth="2.5" />
              <line x1={bx+bw+8} y1={by2} x2={bx+bw+8} y2={by2+bsmtH+12} stroke={OL} strokeWidth="2.5" />
              <rect x={bx-12} y={by2+bsmtH} width={bw+24} height={12} fill={WALL} stroke={OL} strokeWidth="2" />
              <line x1={bx+bw/2+20} y1={by2} x2={bx+bw/2+20} y2={by2+bsmtH} stroke={OL} strokeWidth="1" />
              <text x={bx+bw/4+10} y={by2+24} textAnchor="middle" fill={PK} fontSize="11" fontWeight="700">BOILER</text>
              <text x={bx+bw/4+10} y={by2+38} textAnchor="middle" fill={PK} fontSize="11" fontWeight="700">ROOM</text>
              <rect x={bx+22} y={by2+48} width={28} height={34} rx="2" fill={AG+"20"} stroke={AG} strokeWidth="0.8" />
              <rect x={bx+26} y={by2+42} width={6} height={10} fill={AG+"30"} stroke={AG} strokeWidth="0.5" />
              <line x1={bx+50} y1={by2+58} x2={bx+80} y2={by2+58} stroke={OL} strokeWidth="0.8" />
              <line x1={bx+50} y1={by2+68} x2={bx+80} y2={by2+68} stroke={OL} strokeWidth="0.8" />
              <text x={bx+bw*3/4+10} y={by2+24} textAnchor="middle" fill={PK} fontSize="11" fontWeight="700">ELEVATOR</text>
              <text x={bx+bw*3/4+10} y={by2+38} textAnchor="middle" fill={PK} fontSize="11" fontWeight="700">ROOM</text>
              <rect x={bx+bw*3/4-5} y={by2+50} width={32} height={22} rx="2" fill={AG+"15"} stroke={AG+"40"} strokeWidth="0.8" />
              <rect x={bx+bodyW+10} y={by2+42} width={elevW-20} height={44} rx="2" fill={AG+"10"} stroke={OL} strokeWidth="0.8" />
              <text x={bx+bw/2} y={by2+bsmtH+22} textAnchor="middle" fill={TXT2} fontSize="8" letterSpacing="3" opacity="0.5">▼ BELOW GRADE ▼</text>
            </g>);
          })()}

          {/* ═══ COMMON AREA ITEMS ON ROOF (Gold/Amber) ═══ */}
          {showAreas?.roof !== false && caItems("roof").map((item, i) => {
            const key = `roof-${item}`;
            const statusCol = getCAColor("roof", item);
            const areaCol = "#FFD700";
            const rx = bx + 8 + i * 95;
            const ry = by - parapetH - bulkH - 28;
            return (
              <g key={key} onClick={() => setEditingCA(key)} style={{ cursor: "pointer" }}>
                <rect x={rx} y={ry} width={90} height={24} rx="4" fill={areaCol + "25"} stroke={areaCol} strokeWidth="2" />
                <circle cx={rx+12} cy={ry+12} r="5" fill={statusCol} stroke={statusCol === "#FFFFFF" ? "#999" : statusCol} strokeWidth="0.5" />
                <text x={rx+50} y={ry+15} textAnchor="middle" fill={areaCol} fontSize="10" fontWeight="700">{item}</text>
              </g>
            );
          })}

          {/* ═══ COMMON AREA ITEMS IN ELEVATOR SHAFT (Cyan/Teal) ═══ */}
          {showAreas?.elev !== false && caItems("elev").map((item, i) => {
            const key = `elev-${item}`;
            const statusCol = getCAColor("elev", item);
            const areaCol = "#00BCD4";
            const ey2 = by + 8 + i * 30;
            return (
              <g key={key} onClick={() => setEditingCA(key)} style={{ cursor: "pointer" }}>
                <rect x={bx+bodyW+4} y={ey2} width={elevW-8} height={24} rx="4" fill={areaCol + "25"} stroke={areaCol} strokeWidth="2" />
                <circle cx={bx+bodyW+16} cy={ey2+12} r="5" fill={statusCol} stroke={statusCol === "#FFFFFF" ? "#999" : statusCol} strokeWidth="0.5" />
                <text x={bx+bodyW+elevW/2+4} y={ey2+15} textAnchor="middle" fill={areaCol} fontSize="9" fontWeight="700">{item}</text>
              </g>
            );
          })}

          {/* ═══ COMMON AREA ITEMS IN BASEMENT (Orange) ═══ */}
          {showAreas?.base !== false && caItems("base").map((item, i) => {
            const key = `base-${item}`;
            const statusCol = getCAColor("base", item);
            const areaCol = "#FF9800";
            const bsy = by + bodyH + stepsH;
            const bsx = bx + 8 + i * 90;
            return (
              <g key={key} onClick={() => setEditingCA(key)} style={{ cursor: "pointer" }}>
                <rect x={bsx} y={bsy+bsmtH-30} width={85} height={24} rx="4" fill={areaCol + "25"} stroke={areaCol} strokeWidth="2" />
                <circle cx={bsx+12} cy={bsy+bsmtH-18} r="5" fill={statusCol} stroke={statusCol === "#FFFFFF" ? "#999" : statusCol} strokeWidth="0.5" />
                <text x={bsx+50} y={bsy+bsmtH-15} textAnchor="middle" fill={areaCol} fontSize="10" fontWeight="700">{item}</text>
              </g>
            );
          })}

        </svg>
      </div>

      {/* ═══ GROUNDS SECTION (Purple/Violet) ═══ */}
      {showAreas?.grnd !== false && caItems("grnd").length > 0 && (
        <div style={{ display: "flex", justifyContent: "center", marginTop: 6 }}>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", padding: "10px 16px", background: "#9C27B0" + "12", border: `2px solid #9C27B0`, borderRadius: 8 }}>
            <span style={{ fontFamily: font, fontSize: 13, color: "#CE93D8", fontWeight: 700, alignSelf: "center", marginRight: 6 }}>🌳 GROUNDS:</span>
            {caItems("grnd").map(item => {
              const key = `grnd-${item}`;
              const statusCol = getCAColor("grnd", item);
              return (
                <button key={key} onClick={() => setEditingCA(key)}
                  style={{ padding: "6px 14px", borderRadius: 6, fontSize: 12, fontFamily: font, fontWeight: 700,
                    background: "#9C27B0" + "20", color: "#CE93D8", border: `2px solid #9C27B0`,
                    cursor: "pointer", display: "flex", alignItems: "center", gap: 6 }}>
                  <span style={{ width: 12, height: 12, borderRadius: "50%", background: statusCol, display: "inline-block",
                    border: statusCol === "#FFFFFF" ? "1px solid #999" : "none" }} />
                  {item}
                </button>
              );
            })}
          </div>
        </div>
      )}

      {/* ═══ COMMON AREA EDIT POPUP ═══ */}
      {editingCA && (
        <div style={S.modal} onClick={() => setEditingCA(null)}>
          <div style={{ ...S.modalInner, maxWidth: 420 }} onClick={e => e.stopPropagation()}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <h3 style={{ fontFamily: font, color: PK, margin: 0, fontSize: 16 }}>{editingCA.replace("-", " → ")}</h3>
              <button style={S.btn()} onClick={() => setEditingCA(null)}>✕</button>
            </div>
            <div style={{ marginBottom: 12 }}>
              <label style={S.label}>Status (click to change)</label>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                {["Pending","Started","In Progress","Complete"].map(st => {
                  const active = (commonAreas[editingCA]?.status || "Pending") === st;
                  return (
                    <button key={st} style={{
                      ...S.btn(active ? "primary" : undefined), fontSize: 12, padding: "8px 14px",
                      background: active ? getTradeColor(st) : undefined,
                      color: active ? (st === "Pending" || st === "In Progress" ? "#000" : "#FFF") : undefined,
                    }} onClick={() => setCommonAreas({ ...commonAreas, [editingCA]: { ...commonAreas[editingCA], status: st, trades: commonAreas[editingCA]?.trades || {} } })}>
                      {st}
                    </button>
                  );
                })}
              </div>
            </div>
            <div style={{ marginBottom: 12 }}>
              <label style={S.label}>Assign Trades</label>
              <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
                {TRADES.map(t => {
                  const on = commonAreas[editingCA]?.trades?.[t];
                  return (
                    <button key={t} style={{ ...S.btn(on ? "primary" : undefined), fontSize: 10, padding: "4px 8px" }}
                      onClick={() => {
                        const cur = commonAreas[editingCA] || { trades: {}, status: "Pending" };
                        setCommonAreas({ ...commonAreas, [editingCA]: { ...cur, trades: { ...cur.trades, [t]: !on } } });
                      }}>{on ? "✓ " : ""}{t}</button>
                  );
                })}
              </div>
            </div>
            <button style={S.btn("primary")} onClick={() => setEditingCA(null)}>Done</button>
          </div>
        </div>
      )}
    </div>
  );
};

// ▸ Unit Detail Modal
const UnitModal = ({ unit, onClose, onUpdate }) => {
  const [tab, setTab] = useState("info");
  const [comment, setComment] = useState("");
  const [isRecording, setIsRecording] = useState(false);
  const [photoAnnotation, setPhotoAnnotation] = useState("");

  if (!unit) return null;

  const handleTradeUpdate = (trade, field, value) => {
    const updated = { ...unit, trades: { ...unit.trades, [trade]: { ...unit.trades[trade], [field]: value } } };
    onUpdate(updated);
  };

  const handleContactUpdate = (field, value) => {
    const updated = { ...unit, contact: { ...unit.contact, [field]: value } };
    onUpdate(updated);
  };

  const addComment = () => {
    if (!comment.trim()) return;
    const updated = { ...unit, comments: [...unit.comments, { text: comment, date: new Date().toISOString(), type: "text" }] };
    onUpdate(updated);
    setComment("");
  };

  const simulateVoice = () => {
    setIsRecording(true);
    setTimeout(() => {
      setIsRecording(false);
      const updated = { ...unit, comments: [...unit.comments, { text: "🎤 [Voice transcription] Inspected unit - plumbing rough-in looks good, electrical panel needs attention on south wall.", date: new Date().toISOString(), type: "voice" }] };
      onUpdate(updated);
    }, 2000);
  };

  const fileInputRef = useRef(null);
  const [viewingPhoto, setViewingPhoto] = useState(null);

  const addPhoto = (e) => {
    const files = e?.target?.files;
    if (!files || files.length === 0) return;
    Array.from(files).forEach(file => {
      const reader = new FileReader();
      reader.onload = (ev) => {
        const annotation = photoAnnotation || file.name || "Site photo";
        const newPhoto = { id: Date.now() + Math.random(), annotation, date: new Date().toISOString(), marked: false, src: ev.target.result, fileName: file.name };
        const updated = { ...unit, photos: [...unit.photos, newPhoto] };
        onUpdate(updated);
      };
      reader.readAsDataURL(file);
    });
    setPhotoAnnotation("");
    if (fileInputRef.current) fileInputRef.current.value = "";
  };

  const deletePhoto = (photoId) => {
    const updated = { ...unit, photos: unit.photos.filter(p => p.id !== photoId) };
    onUpdate(updated);
    setViewingPhoto(null);
  };

  return (
    <div style={S.modal} onClick={onClose}>
      <div style={S.modalInner} onClick={e => e.stopPropagation()}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <div>
            <h2 style={{ fontFamily: font, color: PK, margin: 0, fontSize: 20 }}>UNIT {unit.unit}</h2>
            <span style={S.tag(unit.vacant ? PK3 : AG)}>{unit.vacant ? "VACANT" : "OCCUPIED"}</span>
          </div>
          <button style={S.btn()} onClick={onClose}>✕ Close</button>
        </div>

        <div style={{ display: "flex", gap: 4, marginBottom: 16, borderBottom: `1px solid ${BD}`, paddingBottom: 8, flexWrap: "wrap" }}>
          {["info","trades","comments","photos","notices"].map(t => (
            <button key={t} style={S.tab(tab === t)} onClick={() => setTab(t)}>{t.charAt(0).toUpperCase() + t.slice(1)}</button>
          ))}
        </div>

        {tab === "info" && (
          <div>
            <div style={S.cardTitle}>Contact Information</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
              <div><label style={S.label}>First Name</label><input style={S.input} value={unit.contact.first} onChange={e => handleContactUpdate("first", e.target.value)} /></div>
              <div><label style={S.label}>Last Name</label><input style={S.input} value={unit.contact.last} onChange={e => handleContactUpdate("last", e.target.value)} /></div>
              <div><label style={S.label}>Phone</label><input style={S.input} value={unit.contact.phone} onChange={e => handleContactUpdate("phone", e.target.value)} /></div>
              <div><label style={S.label}>Email</label><input style={S.input} value={unit.contact.email} onChange={e => handleContactUpdate("email", e.target.value)} /></div>
              <div><label style={S.label}>Unit Number</label><input style={S.input} value={unit.unit} readOnly /></div>
              <div><label style={S.label}>Floor</label><input style={S.input} value={unit.floor} readOnly /></div>
            </div>
            <div style={{ marginTop: 12 }}>
              <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer" }}>
                <input type="checkbox" checked={unit.vacant} onChange={e => onUpdate({ ...unit, vacant: e.target.checked })} />
                <span style={{ fontSize: 13 }}>Unit is Vacant</span>
              </label>
            </div>
          </div>
        )}

        {tab === "trades" && (
          <div>
            {TRADES.map(trade => {
              const t = unit.trades[trade];
              return (
                <div key={trade} style={{ ...S.card, display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
                  <div style={{ minWidth: 110 }}>
                    <span style={{ fontFamily: font, fontSize: 12, fontWeight: 700 }}>{trade}</span>
                  </div>
                  <select style={S.select} value={t.status} onChange={e => handleTradeUpdate(trade, "status", e.target.value)}>
                    <option>Pending</option><option>Started</option><option>In Progress</option><option>Complete</option>
                  </select>
                  <select style={S.select} value={t.phase} onChange={e => handleTradeUpdate(trade, "phase", e.target.value)}>
                    {PHASES.map(p => <option key={p}>{p}</option>)}
                  </select>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <div style={{ width: 14, height: 14, borderRadius: 3, background: getTradeColor(t.status) }} />
                    {t.accessDenied && <span style={S.tag(PK2)}>⚠ NO ACCESS</span>}
                  </div>
                  <label style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 11, color: TXT2 }}>
                    <input type="checkbox" checked={t.accessDenied} onChange={e => handleTradeUpdate(trade, "accessDenied", e.target.checked)} /> Access Denied
                  </label>
                </div>
              );
            })}

        )}

        {tab === "comments" && (
          <div>
            <div style={{ marginBottom: 12 }}>
              <textarea style={S.textarea} value={comment} onChange={e => setComment(e.target.value)} placeholder="Add a comment..." spellCheck={true} />
              <div style={{ display: "flex", gap: 8, marginTop: 8 }}>

                <button style={S.btn(isRecording ? "danger" : undefined)} onClick={simulateVoice}>

                </button>
              </div>
            </div>
            <div style={{ maxHeight: 300, overflow: "auto" }}>
              {unit.comments.length === 0 && <div style={{ color: TXT2, fontSize: 13 }}>No comments yet</div>}

                <div key={i} style={{ ...S.card, padding: 10 }}>
                  <div style={{ fontSize: 10, color: TXT2, marginBottom: 4, fontFamily: font }}>{formatDate(c.date)} • {c.type === "voice" ? "🎤 Voice" : "💬 Text"}</div>
                  <div style={{ fontSize: 13 }}>{c.text}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {tab === "photos" && (
          <div>
            <div style={{ marginBottom: 12 }}>
              <input style={S.input} placeholder="Photo annotation / description (optional)..." value={photoAnnotation} onChange={e => setPhotoAnnotation(e.target.value)} />
              <div style={{ display: "flex", gap: 8, marginTop: 8, alignItems: "center" }}>
                <input ref={fileInputRef} type="file" accept="image/*" multiple onChange={addPhoto}
                  style={{ display: "none" }} />
                <button style={S.btn("primary")} onClick={() => fileInputRef.current?.click()}>📷 Upload Photo</button>
                <button style={S.btn()} onClick={() => {
                  if (fileInputRef.current) {
                    fileInputRef.current.setAttribute("capture", "environment");
                    fileInputRef.current.click();
                    fileInputRef.current.removeAttribute("capture");
                  }
                }}>📱 Take Photo</button>
                <span style={{ fontSize: 11, color: TXT2 }}>{unit.photos.length} photo(s)</span>
              </div>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(160px, 1fr))", gap: 8 }}>
              {unit.photos.map((p, i) => (
                <div key={p.id} style={{ ...S.card, padding: 8, textAlign: "center" }}>
                  <div onClick={() => setViewingPhoto(p)} style={{ cursor: "pointer", borderRadius: 4, overflow: "hidden", height: 120, marginBottom: 6, background: BD }}>
                    {p.src ? (
                      <img src={p.src} alt={p.annotation} style={{ width: "100%", height: "100%", objectFit: "cover" }} />
                    ) : (
                      <div style={{ height: "100%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 28 }}>📸</div>
                    )}
                  </div>
                  <div style={{ fontSize: 11, color: PK, fontFamily: font, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.annotation}</div>
                  <div style={{ fontSize: 9, color: TXT2 }}>{formatDate(p.date)}</div>
                  <div style={{ display: "flex", gap: 4, justifyContent: "center", marginTop: 4 }}>
                    <button style={{ ...S.btn(), fontSize: 10, padding: "2px 8px" }} onClick={() => {
                      const updated = { ...unit, photos: unit.photos.map((ph, idx) => idx === i ? { ...ph, marked: !ph.marked } : ph) };
                      onUpdate(updated);
                    }}>{p.marked ? "✅ Marked" : "✏️ Mark"}</button>
                    <button style={{ ...S.btn("danger"), fontSize: 10, padding: "2px 8px" }} onClick={() => deletePhoto(p.id)}>🗑️</button>
                  </div>
                </div>
              ))}
              {unit.photos.length === 0 && <div style={{ color: TXT2, fontSize: 13, gridColumn: "1 / -1" }}>No photos yet — upload or take a photo</div>}
            </div>

            {/* Photo Viewer Modal */}
            {viewingPhoto && (
              <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.95)", zIndex: 300, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 20 }}
                onClick={() => setViewingPhoto(null)}>
                <div style={{ maxWidth: "90vw", maxHeight: "80vh", position: "relative" }} onClick={e => e.stopPropagation()}>
                  {viewingPhoto.src ? (
                    <img src={viewingPhoto.src} alt={viewingPhoto.annotation} style={{ maxWidth: "100%", maxHeight: "75vh", borderRadius: 8, border: `2px solid ${PK}` }} />
                  ) : (
                    <div style={{ width: 400, height: 300, background: BD, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 48, borderRadius: 8 }}>📸</div>
                  )}
                  <div style={{ textAlign: "center", marginTop: 12 }}>
                    <div style={{ fontFamily: font, fontSize: 14, color: AG, fontWeight: 700 }}>{viewingPhoto.annotation}</div>
                    <div style={{ fontSize: 11, color: TXT2, marginTop: 2 }}>{formatDate(viewingPhoto.date)} • Unit {unit.unit}</div>
                    <div style={{ display: "flex", gap: 8, justifyContent: "center", marginTop: 8 }}>
                      <button style={S.btn("danger")} onClick={() => deletePhoto(viewingPhoto.id)}>🗑️ Delete</button>
                      <button style={S.btn()} onClick={() => setViewingPhoto(null)}>✕ Close</button>
                    </div>
                  </div>
                </div>
              </div>
            )}
          </div>
        )}

        {tab === "notices" && (
          <div>
            <NoticeGenerator unit={unit} onUpdate={onUpdate} />
          </div>
        )}
      </div>
    </div>
  );
};

// ▸ Notice Generator
const NoticeGenerator = ({ unit, onUpdate, bulk }) => {
  const [noticeText, setNoticeText] = useState("");
  const [startDate, setStartDate] = useState("");
  const [endDate, setEndDate] = useState("");
  const [selectedTrades, setSelectedTrades] = useState([]);
  const [sendMethod, setSendMethod] = useState("print");

  const generateNotice = () => {
    const notice = {
      id: Date.now(),
      date: new Date().toISOString(),
      unit: unit?.unit || "BULK",
      text: noticeText,
      startDate, endDate,
      trades: selectedTrades,
      method: sendMethod,
    };
    if (unit) {
      const updated = { ...unit, notices: [...unit.notices, notice] };
      onUpdate(updated);
    }
    alert(`📋 Notice ${sendMethod === "print" ? "sent to printer" : sendMethod === "email" ? `emailed to ${unit?.contact.email || "multiple"}` : `texted to ${unit?.contact.phone || "multiple"}`}\n\n📁 Notice saved to Desktop/Notices/ folder`);
    setNoticeText("");
  };

  return (
    <div>
      <div style={S.cardTitle}>Generate Notice {bulk && "(Bulk)"}</div>
      <div style={{ marginBottom: 8 }}>
        <label style={S.label}>Work Schedule</label>
        <div style={{ display: "flex", gap: 8 }}>
          <input type="date" style={S.input} value={startDate} onChange={e => setStartDate(e.target.value)} />
          <span style={{ color: TXT2, alignSelf: "center" }}>to</span>
          <input type="date" style={S.input} value={endDate} onChange={e => setEndDate(e.target.value)} />
        </div>
      </div>
      <div style={{ marginBottom: 8 }}>
        <label style={S.label}>Trades Involved</label>
        <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
          {TRADES.map(t => (
            <button key={t} style={{ ...S.btn(selectedTrades.includes(t) ? "primary" : undefined), fontSize: 10, padding: "4px 8px" }}
              onClick={() => setSelectedTrades(prev => prev.includes(t) ? prev.filter(x => x !== t) : [...prev, t])}>
              {t}
            </button>
          ))}
        </div>
      </div>
      <div style={{ marginBottom: 8 }}>
        <label style={S.label}>Notice Content</label>
        <textarea style={S.textarea} value={noticeText} onChange={e => setNoticeText(e.target.value)}
          placeholder="Dear Resident, work will begin in your unit..." spellCheck={true} />
      </div>
      <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
        <select style={S.select} value={sendMethod} onChange={e => setSendMethod(e.target.value)}>
          <option value="print">🖨️ Print</option>
          <option value="email">📧 Email</option>
          <option value="text">📱 Text Message</option>
        </select>
        <button style={S.btn("primary")} onClick={generateNotice}>📋 Generate & Send Notice</button>
        <span style={{ fontSize: 10, color: TXT2 }}>File saved to Desktop/Notices/</span>
      </div>
    </div>
  );
};

// ▸ Schedule View
const ScheduleView = ({ schedule, units }) => {
  const [view, setView] = useState("global");
  const today = new Date();
  const twoWeeks = new Date(today);
  twoWeeks.setDate(twoWeeks.getDate() + 14);

  const globalStart = Object.values(schedule).reduce((min, s) => s.start < min ? s.start : min, "9999-99-99");
  const globalEnd = Object.values(schedule).reduce((max, s) => s.end > max ? s.end : max, "0000-00-00");

  return (
    <div>
      <div style={{ display: "flex", gap: 4, marginBottom: 16, flexWrap: "wrap" }}>
        <button style={S.navBtn(view === "global")} onClick={() => setView("global")}>Global Schedule</button>
        <button style={S.navBtn(view === "lookahead")} onClick={() => setView("lookahead")}>2-Week Look Ahead</button>
        {TRADES.map(t => (
          <button key={t} style={S.navBtn(view === t)} onClick={() => setView(t)}>{t}</button>
        ))}
      </div>

      {view === "global" && (
        <div style={S.card}>
          <div style={S.cardTitle}>Global Project Schedule</div>
          <div style={{ marginBottom: 12, fontSize: 13, color: TXT2 }}>
            Project: {formatDate(globalStart)} → {formatDate(globalEnd)}
          </div>
          {TRADES.map(t => {
            const s = schedule[t];
            return (
              <div key={t} style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 10 }}>
                <div style={{ minWidth: 100, fontFamily: font, fontSize: 11, fontWeight: 600 }}>{t}</div>
                <div style={S.progressBar()}>
                  <div style={S.progressFill(s.progress, s.progress === 100 ? AG : s.progress > 0 ? AG2 : PK2)} />
                </div>
                <span style={{ fontFamily: font, fontSize: 11, color: TXT2, minWidth: 35 }}>{s.progress}%</span>
                <span style={{ fontSize: 10, color: TXT2 }}>{formatDate(s.start)} - {formatDate(s.end)}</span>
              </div>
            );
          })}
        </div>
      )}

      {view === "lookahead" && (
        <div style={S.card}>
          <div style={S.cardTitle}>2-Week Look Ahead</div>
          <div style={{ fontSize: 13, color: TXT2, marginBottom: 12 }}>
            {formatDate(today)} → {formatDate(twoWeeks)}
          </div>
          {TRADES.map(trade => {
            const scheduledUnits = units.filter(u => u.trades[trade]?.scheduled);
            const accessIssues = scheduledUnits.filter(u => u.trades[trade]?.accessDenied);
            if (scheduledUnits.length === 0) return null;
            return (
              <div key={trade} style={{ ...S.card, padding: 10, marginBottom: 8 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                  <span style={{ fontFamily: font, fontSize: 12, fontWeight: 700 }}>{trade}</span>
                  <span style={{ fontSize: 11, color: TXT2 }}>{scheduledUnits.length} units scheduled</span>
                </div>
                <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
                  {scheduledUnits.map(u => (
                    <span key={u.id} style={S.tag(u.trades[trade].accessDenied ? PK2 : AG)}>
                      {u.unit} {u.trades[trade].accessDenied && "⚠"}
                    </span>
                  ))}
                </div>
                {accessIssues.length > 0 && (
                  <div style={{ marginTop: 6, fontSize: 11, color: PK2 }}>
                    ⚠ {accessIssues.length} unit(s) with access issues: {accessIssues.map(u => u.unit).join(", ")}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {TRADES.includes(view) && (
        <div style={S.card}>
          <div style={S.cardTitle}>{view} Schedule</div>
          <div style={{ marginBottom: 12 }}>
            <div style={{ display: "flex", gap: 12, fontSize: 13 }}>
              <span>Start: <strong>{formatDate(schedule[view].start)}</strong></span>
              <span>End: <strong>{formatDate(schedule[view].end)}</strong></span>
              <span>Progress: <strong>{schedule[view].progress}%</strong></span>
            </div>
          </div>
          <div style={S.cardTitle}>Units by Status</div>
          {["Pending", "Started", "In Progress", "Complete"].map(status => {
            const matching = units.filter(u => u.trades[view]?.status === status);
            return (
              <div key={status} style={{ marginBottom: 8 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }}>
                  <div style={{ width: 10, height: 10, borderRadius: 2, background: getTradeColor(status) }} />
                  <span style={{ fontFamily: font, fontSize: 11, fontWeight: 600 }}>{status} ({matching.length})</span>
                </div>
                <div style={{ display: "flex", gap: 3, flexWrap: "wrap" }}>
                  {matching.slice(0, 40).map(u => (
                    <span key={u.id} style={{ ...S.tag(getTradeColor(status)), fontSize: 9 }}>{u.unit}</span>
                  ))}
                  {matching.length > 40 && <span style={{ fontSize: 10, color: TXT2 }}>+{matching.length - 40} more</span>}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
};

// ▸ Common Areas (Fully Editable)
const CommonAreasView = ({ commonAreas, setCommonAreas, areaList, setAreaList }) => {
  const [selectedItem, setSelectedItem] = useState(null);
  const [addingArea, setAddingArea] = useState(false);
  const [newAreaLabel, setNewAreaLabel] = useState("");
  const [newAreaIcon, setNewAreaIcon] = useState("🔧");
  const [addingItemTo, setAddingItemTo] = useState(null);
  const [newItemName, setNewItemName] = useState("");
  const [editingAreaId, setEditingAreaId] = useState(null);
  const [editLabel, setEditLabel] = useState("");
  const [itemNote, setItemNote] = useState("");

  const iconOptions = ["🛗","🏗️","🔧","🌳","🚿","⚡","🔥","❄️","🚪","🏠","📦","🅿️","🗑️","💡","🔨"];

  const addArea = () => {
    if (!newAreaLabel.trim()) return;
    const id = newAreaLabel.toLowerCase().replace(/\\s+/g, "_").slice(0, 8) + "_" + Date.now();
    setAreaList([...areaList, { id, label: newAreaLabel.trim(), icon: newAreaIcon, items: [] }]);
    setNewAreaLabel(""); setAddingArea(false);
  };

  const removeArea = (areaId) => {
    if (!confirm(`Remove this entire area and all its items?`)) return;
    setAreaList(areaList.filter(a => a.id !== areaId));
  };

  const renameArea = (areaId) => {
    if (!editLabel.trim()) return;
    setAreaList(areaList.map(a => a.id === areaId ? { ...a, label: editLabel.trim() } : a));
    setEditingAreaId(null); setEditLabel("");
  };

  const addItem = (areaId) => {
    if (!newItemName.trim()) return;
    setAreaList(areaList.map(a => a.id === areaId ? { ...a, items: [...a.items, newItemName.trim()] } : a));
    setNewItemName(""); setAddingItemTo(null);
  };

  const removeItem = (areaId, itemName) => {
    setAreaList(areaList.map(a => a.id === areaId ? { ...a, items: a.items.filter(i => i !== itemName) } : a));
    const key = `${areaId}-${itemName}`;
    const updated = { ...commonAreas };
    delete updated[key];
    setCommonAreas(updated);
  };

  return (
    <div>
      {/* Add Area Button */}
      <div style={{ display: "flex", gap: 8, marginBottom: 16, alignItems: "center", flexWrap: "wrap" }}>
        <h2 style={{ fontFamily: font, color: TXT, margin: 0, fontSize: 16 }}>COMMON AREAS</h2>
        <button style={S.btn("primary")} onClick={() => setAddingArea(true)}>+ Add Area</button>
        <span style={{ fontSize: 11, color: TXT2 }}>{areaList.length} areas • {areaList.reduce((sum, a) => sum + a.items.length, 0)} items</span>
      </div>

      {/* Add Area Form */}
      {addingArea && (
        <div style={{ ...S.card, marginBottom: 16, display: "flex", gap: 8, alignItems: "flex-end", flexWrap: "wrap" }}>
          <div>
            <label style={S.label}>Icon</label>
            <select style={S.select} value={newAreaIcon} onChange={e => setNewAreaIcon(e.target.value)}>
              {iconOptions.map(ic => <option key={ic} value={ic}>{ic}</option>)}
            </select>
          </div>
          <div style={{ flex: 1, minWidth: 200 }}>
            <label style={S.label}>Area Name</label>
            <input style={S.input} value={newAreaLabel} onChange={e => setNewAreaLabel(e.target.value)}
              placeholder="e.g. Hallways, Compactor Room..." onKeyDown={e => e.key === "Enter" && addArea()} />
          </div>
          <button style={S.btn("primary")} onClick={addArea}>Add</button>
          <button style={S.btn()} onClick={() => setAddingArea(false)}>Cancel</button>
        </div>
      )}

      {/* Area Cards */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(320px, 1fr))", gap: 12 }}>
        {areaList.map(area => (
          <div key={area.id} style={S.card}>
            {/* Area Header */}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              {editingAreaId === area.id ? (
                <div style={{ display: "flex", gap: 4, flex: 1 }}>
                  <input style={{ ...S.input, fontSize: 13 }} value={editLabel} onChange={e => setEditLabel(e.target.value)}
                    onKeyDown={e => e.key === "Enter" && renameArea(area.id)} autoFocus />
                  <button style={{ ...S.btn("primary"), fontSize: 10, padding: "4px 8px" }} onClick={() => renameArea(area.id)}>✓</button>
                  <button style={{ ...S.btn(), fontSize: 10, padding: "4px 8px" }} onClick={() => setEditingAreaId(null)}>✕</button>
                </div>
              ) : (
                <div style={S.cardTitle}>{area.icon} {area.label}</div>
              )}
              <div style={{ display: "flex", gap: 4 }}>
                <button style={{ ...S.btn(), fontSize: 9, padding: "2px 6px" }}
                  onClick={() => { setEditingAreaId(area.id); setEditLabel(area.label); }} title="Rename">✏️</button>
                <button style={{ ...S.btn("danger"), fontSize: 9, padding: "2px 6px" }}
                  onClick={() => removeArea(area.id)} title="Remove area">🗑️</button>
              </div>
            </div>

            {/* Items */}
            {area.items.map(item => {
              const key = `${area.id}-${item}`;
              const data = commonAreas[key] || { trades: {}, status: "Pending", notes: "" };
              const assignedTrades = Object.entries(data.trades || {}).filter(([,v]) => v).map(([k]) => k);
              return (
                <div key={item} style={{ padding: "8px 0", borderBottom: `1px solid ${BD}` }}>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <div style={{ width: 14, height: 14, borderRadius: 3, background: getTradeColor(data.status) }} />
                      <span style={{ fontSize: 13, fontWeight: 600 }}>{item}</span>
                      <span style={{ fontSize: 10, color: TXT2 }}>({data.status})</span>
                    </div>
                    <div style={{ display: "flex", gap: 4 }}>
                      <button style={{ ...S.btn("primary"), fontSize: 10, padding: "3px 8px" }}
                        onClick={() => { setSelectedItem(key); setItemNote(data.notes || ""); }}>Edit</button>
                      <button style={{ ...S.btn("danger"), fontSize: 10, padding: "3px 6px" }}
                        onClick={() => removeItem(area.id, item)}>✕</button>
                    </div>
                  </div>
                  {assignedTrades.length > 0 && (
                    <div style={{ display: "flex", gap: 3, flexWrap: "wrap", marginTop: 4, marginLeft: 22 }}>
                      {assignedTrades.map(t => <span key={t} style={S.tag(AG)}>{t}</span>)}
                    </div>
                  )}
                  {data.notes && (
                    <div style={{ fontSize: 11, color: TXT2, marginTop: 3, marginLeft: 22, fontStyle: "italic" }}>📝 {data.notes}</div>
                  )}
                </div>
              );
            })}

            {/* Add Item */}
            {addingItemTo === area.id ? (
              <div style={{ display: "flex", gap: 4, marginTop: 8 }}>
                <input style={{ ...S.input, fontSize: 12 }} value={newItemName} onChange={e => setNewItemName(e.target.value)}
                  placeholder="New item name..." onKeyDown={e => e.key === "Enter" && addItem(area.id)} autoFocus />
                <button style={{ ...S.btn("primary"), fontSize: 10 }} onClick={() => addItem(area.id)}>Add</button>
                <button style={{ ...S.btn(), fontSize: 10 }} onClick={() => setAddingItemTo(null)}>✕</button>
              </div>
            ) : (
              <button style={{ ...S.btn(), fontSize: 10, marginTop: 8, width: "100%" }}
                onClick={() => { setAddingItemTo(area.id); setNewItemName(""); }}>+ Add Item</button>
            )}
          </div>
        ))}
      </div>

      {/* ── EDIT ITEM MODAL ── */}
      {selectedItem && (
        <div style={S.modal} onClick={() => setSelectedItem(null)}>
          <div style={{ ...S.modalInner, maxWidth: 550 }} onClick={e => e.stopPropagation()}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <h3 style={{ fontFamily: font, color: PK, margin: 0, fontSize: 18 }}>{selectedItem.replace("-", " → ")}</h3>
              <button style={S.btn()} onClick={() => setSelectedItem(null)}>✕ Close</button>
            </div>

            {/* Status */}
            <div style={{ marginBottom: 16 }}>
              <label style={S.label}>Status</label>
              <div style={{ display: "flex", gap: 6 }}>
                {["Pending","Started","In Progress","Complete"].map(st => {
                  const active = (commonAreas[selectedItem]?.status || "Pending") === st;
                  return (
                    <button key={st} style={{ ...S.btn(active ? "primary" : undefined), fontSize: 11, padding: "6px 12px",
                      background: active ? getTradeColor(st) : undefined, color: active ? (st === "Pending" || st === "In Progress" ? "#000" : "#FFF") : undefined }}
                      onClick={() => setCommonAreas({ ...commonAreas, [selectedItem]: { ...commonAreas[selectedItem], status: st } })}>
                      {st}
                    </button>
                  );
                })}
              </div>
            </div>

            {/* Assigned Trades */}
            <div style={{ marginBottom: 16 }}>
              <label style={S.label}>Assigned Trades</label>
              <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
                {TRADES.map(t => {
                  const assigned = commonAreas[selectedItem]?.trades?.[t];
                  return (
                    <button key={t} style={{ ...S.btn(assigned ? "primary" : undefined), fontSize: 11, padding: "5px 10px" }}
                      onClick={() => {
                        const current = commonAreas[selectedItem] || { trades: {}, status: "Pending", notes: "" };
                        setCommonAreas({ ...commonAreas, [selectedItem]: { ...current, trades: { ...current.trades, [t]: !assigned } } });
                      }}>
                      {assigned ? "✓ " : ""}{t}
                    </button>
                  );
                })}
              </div>
            </div>

            {/* Notes */}
            <div style={{ marginBottom: 16 }}>
              <label style={S.label}>Notes / Comments</label>
              <textarea style={S.textarea} value={itemNote} onChange={e => setItemNote(e.target.value)}
                placeholder="Add notes about this area..." spellCheck={true} />
              <button style={{ ...S.btn("primary"), marginTop: 6 }}
                onClick={() => {

      )}

};

// ▸ Bulk Notices
const BulkNotices = ({ units }) => {
  const [selectedUnits, setSelectedUnits] = useState([]);
  const [noticeText, setNoticeText] = useState("");
  const [startDate, setStartDate] = useState("");
  const [endDate, setEndDate] = useState("");
  const [selectedTrades, setSelectedTrades] = useState([]);
  const [sendMethod, setSendMethod] = useState("print");
  const [floorSelect, setFloorSelect] = useState("");

  const selectFloor = (floor) => {
    const floorUnits = units.filter(u => u.floor === parseInt(floor)).map(u => u.id);
    setSelectedUnits(prev => {
      const allSelected = floorUnits.every(id => prev.includes(id));
      return allSelected ? prev.filter(id => !floorUnits.includes(id)) : [...new Set([...prev, ...floorUnits])];
    });
  };

  const maxFloor = Math.max(...units.map(u => u.floor));

  return (
    <div>
      <div style={S.card}>
        <div style={S.cardTitle}>📋 Bulk Notice Distribution</div>
        <div style={{ marginBottom: 12 }}>
          <label style={S.label}>Select Units</label>
          <div style={{ display: "flex", gap: 8, marginBottom: 8, flexWrap: "wrap" }}>
            <button style={S.btn(selectedUnits.length === units.length ? "primary" : undefined)} onClick={() => setSelectedUnits(selectedUnits.length === units.length ? [] : units.map(u => u.id))}>
              {selectedUnits.length === units.length ? "Deselect All" : "Select All"}
            </button>
            <select style={S.select} value={floorSelect} onChange={e => { selectFloor(e.target.value); setFloorSelect(e.target.value); }}>
              <option value="">Select Floor...</option>
              {Array.from({ length: maxFloor }, (_, i) => <option key={i + 1} value={i + 1}>Floor {i + 1}</option>)}
            </select>
            <span style={{ fontSize: 11, color: TXT2, alignSelf: "center" }}>{selectedUnits.length} units selected</span>
          </div>
          <div style={{ display: "flex", gap: 3, flexWrap: "wrap", maxHeight: 100, overflow: "auto" }}>
            {units.map(u => (
              <button key={u.id} style={{ ...S.btn(selectedUnits.includes(u.id) ? "primary" : undefined), fontSize: 9, padding: "2px 6px" }}
                onClick={() => setSelectedUnits(prev => prev.includes(u.id) ? prev.filter(x => x !== u.id) : [...prev, u.id])}>
                {u.unit}
              </button>
            ))}
          </div>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
          <div>
            <label style={S.label}>Work Start</label>
            <input type="date" style={S.input} value={startDate} onChange={e => setStartDate(e.target.value)} />
          </div>
          <div>
            <label style={S.label}>Work End</label>
            <input type="date" style={S.input} value={endDate} onChange={e => setEndDate(e.target.value)} />
          </div>
        </div>
        <div style={{ marginTop: 8 }}>
          <label style={S.label}>Trades</label>
          <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
            {TRADES.map(t => (
              <button key={t} style={{ ...S.btn(selectedTrades.includes(t) ? "primary" : undefined), fontSize: 10, padding: "4px 8px" }}
                onClick={() => setSelectedTrades(prev => prev.includes(t) ? prev.filter(x => x !== t) : [...prev, t])}>
                {t}
              </button>
            ))}
          </div>
        </div>
        <div style={{ marginTop: 8 }}>
          <label style={S.label}>Notice Content</label>
          <textarea style={S.textarea} value={noticeText} onChange={e => setNoticeText(e.target.value)}
            placeholder="Dear Resident, please be advised that construction work is scheduled for your unit..." spellCheck={true} />
        </div>
        <div style={{ display: "flex", gap: 8, marginTop: 12, flexWrap: "wrap" }}>
          <select style={S.select} value={sendMethod} onChange={e => setSendMethod(e.target.value)}>
            <option value="print">🖨️ Print All</option>
            <option value="email">📧 Email All</option>
            <option value="text">📱 Text All</option>
          </select>
          <button style={S.btn("primary")} onClick={() => {
            alert(`📋 ${selectedUnits.length} notices ${sendMethod === "print" ? "sent to printer" : sendMethod === "email" ? "emailed" : "texted"}\n\n📁 All notices saved to Desktop/Notices/ folder`);
          }}>
            Send to {selectedUnits.length} Units
          </button>
          <button style={S.btn("success")} onClick={() => {
            alert(`📁 ${selectedUnits.length} notice files saved to Desktop/Notices/`);
          }}>
            💾 Save All to Desktop
          </button>
        </div>
      </div>
    </div>
  );
};

                        return (
                          <div key={item} style={{ display: "flex", alignItems: "center", gap: 3, marginBottom: 1 }}>
                            <div style={{ width: 7, height: 7, borderRadius: 2, background: col, flexShrink: 0 }} />
                            <span style={{ fontSize: 9, flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{item}</span>
                            <button style={{ background: "none", border: "none", color: TXT2, cursor: "pointer", fontSize: 8 }}
                              onClick={() => setAreaList(areaList.map(a => a.id === area.id ? { ...a, items: a.items.filter(i => i !== item) } : a))}>x</button>
                          </div>
                        );
                      })}
                      {sidebarAddItem === area.id ? (
                        <div style={{ display: "flex", gap: 2, marginTop: 2 }}>
                          <input style={{ ...S.input, fontSize: 9, padding: "2px 4px" }} value={sidebarNewItem}
                            onChange={e => setSidebarNewItem(e.target.value)} placeholder="Item..."
                            onKeyDown={e => { if (e.key === "Enter" && sidebarNewItem.trim()) { setAreaList(areaList.map(a => a.id === area.id ? { ...a, items: [...a.items, sidebarNewItem.trim()] } : a)); setSidebarNewItem(""); setSidebarAddItem(null); }}} autoFocus />
                          <button style={{ ...S.btn("primary"), fontSize: 8, padding: "2px 4px" }}
                            onClick={() => { if (sidebarNewItem.trim()) { setAreaList(areaList.map(a => a.id === area.id ? { ...a, items: [...a.items, sidebarNewItem.trim()] } : a)); setSidebarNewItem(""); setSidebarAddItem(null); }}}>+</button>
                        </div>
                      ) : (
                        <button style={{ background: "none", border: "none", color: AG, cursor: "pointer", fontSize: 8, padding: "1px 0" }}
                          onClick={() => { setSidebarAddItem(area.id); setSidebarNewItem(""); }}>+ add item</button>
                      )}
                    </div>
                  </div>
                ))}

                <button style={{ ...S.btn(), fontSize: 9, padding: "3px 6px", width: "100%", marginTop: 3 }}
                  onClick={() => { const nm = prompt("New area name:"); if (nm?.trim()) { const id = nm.trim().toLowerCase().replace(/\s+/g,"_").slice(0,8)+"_"+Date.now(); setAreaList([...areaList, { id, label: nm.trim(), icon: "🔧", items: [] }]); setShowAreas({...showAreas,[id]:true}); }}}>+ Add Area</button>
                <button style={{ ...S.btn(), fontSize: 9, padding: "3px 6px", width: "100%", marginTop: 3 }}
                  onClick={() => navigate("common")}>Full Editor →</button>
              </div>
            </div>
          )}
        </div>

        {/* ── MAIN CONTENT ── */}
        <div style={{ flex: 1, padding: 20, overflow: "auto", maxHeight: "calc(100vh - 110px)" }}>

        {/* Dashboard */}
        {page === "dashboard" && (
          <div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12, flexWrap: "wrap", gap: 8 }}>
              <div>
                <h2 style={{ fontFamily: font, color: TXT, margin: 0, fontSize: 16 }}>BUILDING OVERVIEW</h2>
                <span style={{ fontSize: 12, color: TXT2 }}>{units.length} units • Click any unit for details</span>
              </div>
            </div>
            <Legend />

            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(150px, 1fr))", gap: 12, marginBottom: 16 }}>
              {[
                { label: "Total Units", value: units.length, color: PK },
                { label: "Pending", value: units.filter(u => !u.vacant && Object.values(u.trades).every(t => t.status === "Pending")).length, color: "#FFFFFF" },
                { label: "Started", value: units.filter(u => !u.vacant && Object.values(u.trades).some(t => t.status === "Started")).length, color: "#E74C3C" },
                { label: "In Progress", value: units.filter(u => Object.values(u.trades).some(t => t.status === "In Progress")).length, color: "#F1C40F" },
                { label: "Completed", value: units.filter(u => !u.vacant && Object.values(u.trades).every(t => t.status === "Complete")).length, color: "#27AE60" },
                { label: "Vacant", value: units.filter(u => u.vacant).length, color: "#FF8C00" },
                { label: "Access Issues", value: units.filter(u => Object.values(u.trades).some(t => t.accessDenied)).length, color: "#E74C3C" },
              ].map(stat => (
                <div key={stat.label} style={{ ...S.card, textAlign: "center", padding: 12 }}>
                  <div style={{ fontFamily: font, fontSize: 32, fontWeight: 800, color: stat.color }}>{stat.value}</div>
                  <div style={{ fontSize: 11, color: TXT2, textTransform: "uppercase", fontFamily: font, letterSpacing: 1 }}>{stat.label}</div>
                </div>
              ))}
            </div>

            <div style={S.card}>
              <div style={S.cardTitle}>Unit Map</div>
              <UnitGrid units={units} onSelect={setSelectedUnit} selectedId={selectedUnit?.id} tradeFilter={tradeFilter} commonAreas={commonAreas} setCommonAreas={setCommonAreas} areaList={areaList} showAreas={showAreas} />
            </div>
          </div>
        )}

        {/* Trade Pages */}
        {page.startsWith("trade-") && (
          <div>
            <h2 style={{ fontFamily: font, color: AG, marginTop: 0, fontSize: 16 }}>{tradeFilter} — TRADE VIEW</h2>
            <Legend />

            <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12, marginBottom: 16 }}>
              {["Pending", "Started", "In Progress", "Complete"].map(status => {
                const count = units.filter(u => u.trades[tradeFilter]?.status === status).length;
                return (
                  <div key={status} style={{ ...S.card, textAlign: "center" }}>
                    <div style={{ fontFamily: font, fontSize: 36, fontWeight: 800, color: getTradeColor(status) }}>{count}</div>
                    <div style={{ fontSize: 11, color: TXT2, fontFamily: font }}>{status}</div>
                  </div>
                );
              })}
            </div>

            <div style={S.card}>
              <div style={S.cardTitle}>Schedule: {tradeFilter}</div>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <div style={S.progressBar()}>
                  <div style={S.progressFill(schedule[tradeFilter]?.progress || 0, AG)} />
                </div>
                <span style={{ fontFamily: font, fontSize: 12 }}>{schedule[tradeFilter]?.progress || 0}%</span>
              </div>
              <div style={{ fontSize: 12, color: TXT2, marginTop: 6 }}>
                {formatDate(schedule[tradeFilter]?.start)} → {formatDate(schedule[tradeFilter]?.end)}
              </div>
            </div>

            <div style={S.card}>
              <div style={S.cardTitle}>{tradeFilter} Unit Map</div>
              <UnitGrid units={units} onSelect={setSelectedUnit} selectedId={selectedUnit?.id} tradeFilter={tradeFilter} commonAreas={commonAreas} setCommonAreas={setCommonAreas} areaList={areaList} showAreas={showAreas} />
            </div>
          </div>
        )}

        {page === "schedule" && <ScheduleView schedule={schedule} units={units} />}
        {page === "field" && <FieldMonitor units={units} />}
        {page === "common" && <CommonAreasView commonAreas={commonAreas} setCommonAreas={setCommonAreas} areaList={areaList} setAreaList={setAreaList} />}
        {page === "notices" && <BulkNotices units={units} />}

        </div>
      </div>

      {selectedUnit && <UnitModal unit={selectedUnit} onClose={() => setSelectedUnit(null)} onUpdate={updateUnit} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
